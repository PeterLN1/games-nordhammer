<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#123b34" data-light="#123b34" data-dark="#0a1512">
<title>Mahjong</title>
<script src="/shared/theme.js"></script>
<style>
  :root {
    --felt: radial-gradient(120% 90% at 50% 0%, #1c5a4e 0%, #123b34 55%, #0d2b26 100%);
    --chrome: rgba(0,0,0,.28);
    --ink: #f2f7f4;
    --muted: rgba(242,247,244,.62);
    /* bricka */
    --tile-face: linear-gradient(158deg, #fffdf7 0%, #f4efe2 100%);
    --tile-edge: #d8cfb6;      /* höger/underkant = tjocklek */
    --tile-hi: rgba(255,255,255,.9);
    --tile-line: rgba(0,0,0,.06);
    /* symbolfärger */
    --bam: #1f9d55;
    --cir: #2f6fd0;
    --chr: #cf3a34;
    --wind: #7a5cc0;
    --gold: #c99a2e;
    --teal: #128f8f;
    --accent: #ffd200;
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme]){
      --felt: radial-gradient(120% 90% at 50% 0%, #123c34 0%, #0c231f 55%, #071512 100%);
      --chrome: rgba(0,0,0,.5);
      --tile-face: linear-gradient(158deg, #f3eee1 0%, #e4ddc9 100%);
      --tile-edge: #b9b096;
    }
  }
  :root[data-theme="dark"]{
    --felt: radial-gradient(120% 90% at 50% 0%, #123c34 0%, #0c231f 55%, #071512 100%);
    --chrome: rgba(0,0,0,.5);
    --tile-face: linear-gradient(158deg, #f3eee1 0%, #e4ddc9 100%);
    --tile-edge: #b9b096;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #0d2b26;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    touch-action: manipulation; overscroll-behavior: none;
  }
  #app { display: flex; flex-direction: column; height: 100dvh; background: var(--felt); }

  header {
    display: flex; align-items: center; gap: 10px;
    padding: max(6px, env(safe-area-inset-top)) 12px 6px;
    background: var(--chrome); flex: 0 0 auto;
  }
  header .back {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 10px; text-decoration: none;
    color: var(--ink); background: rgba(255,255,255,.12); font-size: 18px; line-height: 1;
  }
  header .back:active { background: rgba(255,255,255,.26); }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: .3px; white-space: nowrap; }
  header .spacer { flex: 1; }
  .theme-ctl { display: inline-flex; align-items: center; }
  select {
    font-family: inherit; font-size: 13px; color: var(--ink);
    background: rgba(255,255,255,.14); border: none; border-radius: 8px;
    padding: 7px 26px 7px 10px; -webkit-appearance: none; appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' fill='white'><path d='M0 0l5 6 5-6z'/></svg>");
    background-repeat: no-repeat; background-position: right 9px center;
  }

  #stats {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: center; gap: 18px;
    padding: 7px 12px; font-size: 13px; color: var(--muted); background: rgba(0,0,0,.14);
  }
  #stats b { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; }
  #stats .sep { width: 1px; height: 14px; background: rgba(255,255,255,.18); }
  #statVsVal { color: #7be08a; }
  #statVsVal.vs-behind { color: #ff8a7a; }

  #challengeBar {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: center;
    gap: 6px; flex-wrap: wrap; text-align: center;
    padding: 7px 14px; font-size: 12.5px; font-weight: 600; color: #1a1200;
    background: linear-gradient(135deg, #ffdb42, #ffb300);
  }
  #challengeBar b { font-weight: 800; }

  #boardWrap {
    position: relative; flex: 1 1 auto; overflow: hidden;
  }
  #board { position: absolute; left: 0; top: 0; transform-origin: 0 0; }

  /* ---- fack (Tile Match) ---- */
  #tray {
    flex: 0 0 auto; display: none; justify-content: center; gap: 6px;
    padding: 9px 10px; background: rgba(0,0,0,.18);
  }
  .tray-slot {
    width: 40px; height: 54px; border-radius: 8px; box-sizing: border-box;
    border: 2px dashed rgba(255,255,255,.2);
    display: flex; align-items: center; justify-content: center;
  }
  .tray-slot.filled { border: none; }
  .mini-tile {
    width: 40px; height: 54px; border-radius: 8px; position: relative;
    font-size: 54px; background: var(--tile-face);
    box-shadow: inset 0 0 0 1px var(--tile-line), inset 1px 1px 0 0 var(--tile-hi), 0 2px 4px rgba(0,0,0,.4);
    overflow: hidden; animation: trayPop .18s ease-out;
  }
  .mini-tile.clearing { animation: trayClear .28s ease forwards; }
  @keyframes trayPop { from { transform: scale(.4); opacity: .3; } to { transform: scale(1); opacity: 1; } }
  @keyframes trayClear { to { transform: scale(.3) translateY(-8px); opacity: 0; } }

  .tile {
    position: absolute; width: var(--tw); height: var(--th);
    border-radius: calc(var(--tw) * .14);
    font-size: var(--th); /* 1em = brickhöjd; inre element skalar i em */
    background: var(--tile-face);
    box-shadow:
      inset 0 0 0 1px var(--tile-line),
      inset 1.5px 1.5px 0 0 var(--tile-hi),
      /* tjocklek nedåt/höger */
      2px 3px 0 0 var(--tile-edge),
      3px 5px 0 0 var(--tile-edge),
      4px 8px 12px -3px rgba(0,0,0,.5);
    cursor: pointer;
    transition: transform .14s ease, opacity .24s ease, box-shadow .14s ease;
    will-change: transform, opacity;
  }
  .tile .face {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; overflow: hidden;
    border-radius: inherit;
  }
  .tile.free { cursor: pointer; }
  .tile.blocked { filter: brightness(.9) saturate(.85); cursor: default; }
  .tile.blocked::after {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background: rgba(20,30,25,.22);
  }
  .tile.selected {
    z-index: 90000 !important; /* över alla lager (som max ~4200) så den aldrig skyms */
    box-shadow:
      inset 0 0 0 2px var(--accent),
      inset 1.5px 1.5px 0 0 var(--tile-hi),
      2px 3px 0 0 var(--tile-edge), 3px 5px 0 0 var(--tile-edge),
      0 0 0 3px rgba(255,210,0,.55), 4px 8px 16px -2px rgba(0,0,0,.55);
    transform: translateY(-2px);
  }
  /* Tips: lyft brickan överst och pulsa med kraftig gul ram så den syns
     även om grannbrickorna överlappar. z-index måste ligga över alla lager
     (brickornas z-index går upp till ~4200) annars skyms låga brickor. */
  .tile.hint { z-index: 99999 !important; animation: hintPulse .8s ease-in-out infinite; }
  @keyframes hintPulse {
    0%,100% {
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        inset 0 0 0 3px var(--accent),
        0 0 0 3px rgba(255,210,0,.6),
        6px 10px 16px -3px rgba(0,0,0,.55);
    }
    50% {
      transform: translateY(-8px) scale(1.09);
      box-shadow:
        inset 0 0 0 3px var(--accent),
        0 0 0 7px rgba(255,210,0,.9),
        0 0 22px 4px rgba(255,210,0,.55),
        8px 16px 26px -3px rgba(0,0,0,.6);
    }
  }
  .tile.gone {
    opacity: 0; transform: scale(.55) translateY(-6px); pointer-events: none;
  }

  /* ---- brickmotiv (minimalistiskt) ---- */
  .face .rank { font-weight: 800; line-height: .9; letter-spacing: -.02em; }
  .num .rank { font-size: .5em; }
  .num .suit-ic { width: .3em; height: .3em; margin-top: .06em; opacity: .95; }
  .wind .rank { font-size: .46em; }
  .wind .lbl { font-size: .12em; letter-spacing: .18em; margin-top: .1em; opacity: .7; font-weight: 700; text-transform: uppercase; }
  .glyph { width: .56em; height: .56em; }
  .bonus-bar { position: absolute; left: 14%; right: 14%; bottom: .1em; height: .05em; border-radius: 999px; }
  .face svg { display: block; }
  .c-bam { color: var(--bam); } .c-cir { color: var(--cir); } .c-chr { color: var(--chr); }
  .c-wind { color: var(--wind); } .c-gold { color: var(--gold); } .c-teal { color: var(--teal); }

  footer#controls {
    flex: 0 0 auto; display: flex; justify-content: center; align-items: center; gap: 9px;
    padding: 11px 10px calc(11px + env(safe-area-inset-bottom));
    background: var(--chrome);
  }
  footer#controls button {
    font-family: inherit; font-size: 13px; font-weight: 600;
    display: inline-flex; flex-direction: column; align-items: center; gap: 3px;
    min-width: 62px; min-height: 50px; padding: 6px 8px; border-radius: 13px;
    background: rgba(255,255,255,.1); color: var(--ink); border: 1px solid rgba(255,255,255,.12);
    transition: background .12s, transform .06s;
  }
  footer#controls button .ic { font-size: 19px; line-height: 1; }
  footer#controls button:active { background: rgba(255,255,255,.24); transform: scale(.95); }
  footer#controls button:disabled { opacity: .34; }
  footer#controls button.primary {
    background: var(--accent); color: #1a1200; border-color: #e7bf00;
    box-shadow: 0 2px 12px rgba(255,210,0,.26);
  }

  /* ---- overlay (vinst / dödläge) ---- */
  #overlay {
    position: fixed; inset: 0; z-index: 100; display: none;
    align-items: center; justify-content: center; padding: 24px;
    background: rgba(6,18,15,.72); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  #overlay.show { display: flex; animation: fade .3s ease; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .panel {
    background: linear-gradient(160deg, #1d3f38, #112a25);
    border: 1px solid rgba(255,255,255,.16); border-radius: 22px;
    padding: 28px 26px; text-align: center; max-width: 340px; width: 100%;
    max-height: 86dvh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .iconbtn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 10px; border: none;
    background: rgba(255,255,255,.12); color: var(--ink); font-size: 16px; line-height: 1; font-family: inherit;
  }
  .iconbtn:active { background: rgba(255,255,255,.26); }
  .panel .set-label { text-align: left; font-size: 12px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); margin: 18px 0 8px; }
  .panel .set-hint { text-align: left; font-size: 12.5px; color: var(--muted); margin: 8px 2px 0; }
  .panel .seg { display: flex; gap: 6px; }
  .panel .seg button {
    flex: 1; width: auto; padding: 13px 6px; border-radius: 11px;
    border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.08);
    color: var(--ink); font-size: 14px; font-weight: 600; box-shadow: none;
  }
  .panel .seg button.on { background: var(--accent); color: #1a1200; border-color: #e7bf00; }
  .panel .seg.seg-3 button { font-size: 12px; padding: 11px 3px; }
  .panel select.wide-select {
    width: 100%; font-size: 15px; padding: 13px 34px 13px 12px; border-radius: 11px;
    background-color: rgba(255,255,255,.1); background-position: right 12px center;
  }
  .panel #setStart { margin-top: 18px; }
  /* ---- topplista ---- */
  .lb-area { margin: 4px 0 16px; }
  .lb-area:empty { margin: 0; }
  .lb-title { font-size: 13px; font-weight: 700; color: var(--muted); margin: 6px 0 8px; }
  .lb-list { text-align: left; font-size: 13px; color: var(--muted); max-height: 32vh; overflow-y: auto; }
  .lb-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 9px; }
  .lb-row:nth-child(odd) { background: rgba(255,255,255,.05); }
  .lb-row.me { background: rgba(255,210,0,.16); box-shadow: inset 0 0 0 1px rgba(255,210,0,.4); }
  .lb-rank { width: 26px; text-align: center; font-weight: 800; color: var(--ink); font-size: 14px; }
  .lb-name { flex: 1; color: var(--ink); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-time { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--ink); }
  .lb-empty { text-align: center; padding: 14px; color: var(--muted); }
  .lb-entry { display: flex; gap: 8px; }
  .lb-input {
    flex: 1; width: 100%; font-family: inherit; font-size: 15px; color: var(--ink);
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.16);
    border-radius: 11px; padding: 12px 12px; -webkit-appearance: none; appearance: none;
  }
  .lb-input::placeholder { color: rgba(242,247,244,.45); }
  .panel .lb-save {
    flex: 0 0 auto; font-family: inherit; font-weight: 700; font-size: 15px; width: auto;
    min-height: 48px; padding: 0 22px; margin: 0;
    border-radius: 11px; border: none; background: var(--accent); color: #1a1200; cursor: pointer; box-shadow: none;
  }
  .panel .lb-btn { margin-top: 10px; }
  /* ---- utmaningar (delade givar) ---- */
  .ch-row { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; background: rgba(255,255,255,.05); margin-bottom: 8px; text-align: left; cursor: pointer; }
  .ch-row:active { background: rgba(255,255,255,.1); }
  .ch-main { flex: 1; min-width: 0; }
  .ch-title { font-weight: 700; color: var(--ink); font-size: 14px; }
  .ch-sub { font-size: 12px; color: var(--muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .panel .ch-play {
    flex: 0 0 auto; width: auto; font-family: inherit; font-weight: 700; font-size: 13px;
    padding: 9px 14px; margin: 0; border-radius: 10px; border: none; background: var(--accent); color: #1a1200; box-shadow: none; cursor: pointer;
  }
  /* ---- statistik & märken ---- */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 6px 0 4px; }
  .stat-cell {
    background: rgba(255,255,255,.06); border-radius: 12px; padding: 12px 6px; text-align: center;
  }
  .stat-cell b { display: block; font-size: 22px; font-weight: 800; color: var(--ink); font-variant-numeric: tabular-nums; }
  .stat-cell span { font-size: 11px; color: var(--muted); }
  .badge-list { display: flex; flex-direction: column; gap: 8px; max-height: 40vh; overflow-y: auto; text-align: left; }
  .wn-list { text-align: left; max-height: 42vh; overflow-y: auto; margin: 4px 0 18px; }
  .wn-entry ul { margin: 0; padding: 0 0 0 20px; }
  .wn-entry li { color: var(--ink); font-size: 14.5px; line-height: 1.6; }
  .badge-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; background: rgba(255,255,255,.05); opacity: .5; }
  .badge-item.unlocked { opacity: 1; background: rgba(255,210,0,.12); box-shadow: inset 0 0 0 1px rgba(255,210,0,.3); }
  .badge-ic { font-size: 26px; width: 30px; text-align: center; filter: grayscale(1); }
  .badge-item.unlocked .badge-ic { filter: none; }
  .badge-txt { flex: 1; min-width: 0; }
  .badge-name { font-weight: 700; color: var(--ink); font-size: 14px; }
  .badge-desc { font-size: 12px; color: var(--muted); }
  .badge-check { color: var(--accent); font-weight: 800; font-size: 18px; }
  .panel .emoji { font-size: 46px; }
  .panel h2 { margin: 8px 0 6px; font-size: 24px; }
  .panel p { margin: 0 0 4px; color: var(--muted); font-size: 15px; line-height: 1.5; }
  .panel .big-stat { font-size: 34px; font-weight: 800; margin: 12px 0 2px; font-variant-numeric: tabular-nums; }
  .panel .pen-note { font-size: 12.5px; color: var(--muted); margin: 2px 0 0; }
  .panel .best { font-size: 13px; color: var(--muted); margin-bottom: 18px; margin-top: 6px; }
  .panel button {
    font-family: inherit; font-size: 16px; font-weight: 700; width: 100%;
    padding: 15px; border-radius: 14px; border: none; cursor: pointer;
    background: var(--accent); color: #1a1200; box-shadow: 0 4px 16px rgba(255,210,0,.3);
  }
  .panel button.ghost { background: rgba(255,255,255,.12); color: var(--ink); box-shadow: none; margin-top: 10px; }
  .panel button:active { transform: scale(.98); }

  #toast {
    position: fixed; left: 50%; bottom: calc(90px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(10px); z-index: 10000; /* över #overlay (100) — annars döljs notisen bakom en öppen panel */
    background: rgba(0,0,0,.85); color: #fff; padding: 12px 20px; border-radius: 999px;
    font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s; max-width: 84vw; text-align: center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.cheer {
    background: linear-gradient(135deg, #ffdb42, #ffb300); color: #241800;
    font-size: 17px; font-weight: 800; letter-spacing: .2px;
    padding: 11px 22px; border: 2px solid #fff3c0;
    box-shadow: 0 8px 28px rgba(255,180,0,.55), 0 0 0 6px rgba(255,210,0,.14);
    bottom: auto; top: max(10px, env(safe-area-inset-top));
  }
  #toast.cheer.show { animation: cheerDrop .4s cubic-bezier(.3,1.4,.5,1) both; }
  @keyframes cheerDrop {
    0% { transform: translateX(-50%) translateY(-140%); opacity: 0; }
    70% { transform: translateX(-50%) translateY(6%); opacity: 1; }
    100% { transform: translateX(-50%) translateY(0); opacity: 1; }
  }
</style>
</head>
<body>
  <div id="app">
    <header>
      <a class="back" href="/" aria-label="Till startsidan">‹</a>
      <h1>Mahjong</h1>
      <span class="spacer"></span>
      <button id="btnLeaderboard" class="iconbtn" aria-label="Topplista">🏆</button>
      <button id="btnStats" class="iconbtn" aria-label="Statistik">📊</button>
      <button id="btnSettings" class="iconbtn" aria-label="Inställningar">⚙</button>
    </header>

    <div id="challengeBar" style="display:none"></div>

    <div id="stats">
      <span>Tid <b id="statTime">0:00</b></span>
      <span class="sep"></span>
      <span><span id="statMidLabel">Par kvar</span> <b id="statPairs">72</b></span>
      <span class="sep"></span>
      <span>Drag <b id="statMoves">0</b></span>
      <span class="sep" id="statVsSep" style="display:none"></span>
      <span id="statVsWrap" style="display:none">🎯 <b id="statVsVal">–</b></span>
    </div>

    <div id="boardWrap">
      <div id="board"></div>
    </div>

    <div id="tray"></div>

    <footer id="controls">
      <button id="btnNew" class="primary"><span class="ic">♻︎</span>Ny giv</button>
      <button id="btnUndo"><span class="ic">↩︎</span>Ångra</button>
      <button id="btnHint"><span class="ic">💡</span>Tips</button>
      <button id="btnShuffle"><span class="ic">🔀</span>Blanda</button>
    </footer>
  </div>

  <div id="overlay"><div class="panel" id="panel"></div></div>
  <div id="toast"></div>

<script>
"use strict";
(function(){
  /* ============================================================
     Mahjong Solitaire — Nordhammer Spel
     Ren HTML/CSS/JS. Klassisk turtle-layout (144 brickor),
     garanterat lösbara givar via bakvänd generering.
     ============================================================ */

  var TW = 52, TH = 70;          // brickmått i px (naturlig storlek, board skalas sen)
  var DX = 7, DY = 8;            // lagerförskjutning (djup)
  var MARGIN = 5 * Math.max(DX, DY);

  /* ---------- Brickmotiv ---------- */
  // SVG-ikoner (viewBox 0 0 24 24), currentColor = symbolfärg
  var IC = {
    bam: '<svg class="suit-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M7 3v18M17 3v18"/><path d="M4 9h6M14 9h6M4 15h6M14 15h6" stroke-width="2"/></svg>',
    cir: '<svg class="suit-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="8"/></svg>',
    chr: '<svg class="suit-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 12h8" stroke-width="2.6" stroke-linecap="round"/></svg>',
    compass: '<svg class="suit-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"><path d="M12 3l3 9-3 9-3-9z" fill="currentColor" fill-opacity=".25"/></svg>'
  };
  // Drakar (emblem)
  var DR = {
    r: '<svg class="glyph c-chr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linejoin="round"><rect x="5" y="4" width="14" height="16" rx="2"/><path d="M12 2v20" stroke-linecap="round"/></svg>',
    g: '<svg class="glyph c-bam" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15c4-8 12-8 16 0"/><path d="M4 10c4-8 12-8 16 0" opacity=".55"/></svg>',
    w: '<svg class="glyph c-cir" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>'
  };
  // Blommor & årstider (fyra distinkta motiv per grupp)
  var FL = {
    1: '<svg class="glyph c-gold" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="6" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="12" r="3"/><circle cx="9" cy="18" r="3"/><circle cx="15" cy="18" r="3"/></svg>',
    2: '<svg class="glyph c-gold" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 21c-3-6-3-12 0-18 3 6 3 12 0 18z"/><path d="M12 21c5-3 8-8 8-14"/><path d="M12 21c-5-3-8-8-8-14"/></svg>',
    3: '<svg class="glyph c-gold" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 12l0-8M12 12l7-4M12 12l7 4M12 12l-7 4M12 12l-7-4M12 12l4 7M12 12l-4 7"/></svg>',
    4: '<svg class="glyph c-gold" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c2 4 6 5 6 10a6 6 0 0 1-12 0c0-5 4-6 6-10z"/></svg>'
  };
  var SE = {
    1: '<svg class="glyph c-teal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 13c0-4 3-7 7-7-1 5-3 7-7 7z"/><path d="M12 21V11"/></svg>',
    2: '<svg class="glyph c-teal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="4.5" fill="currentColor"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2" stroke-linecap="round"/></svg>',
    3: '<svg class="glyph c-teal" viewBox="0 0 24 24" fill="currentColor"><path d="M11 3h2v7l5-3 1 2-6 3 6 3-1 2-5-3v7h-2v-7l-5 3-1-2 6-3-6-3 1-2 5 3z"/></svg>',
    4: '<svg class="glyph c-teal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 2v20M2 12h20M5 5l14 14M19 5L5 19"/></svg>'
  };

  // Brickregister: key -> {match, html}
  var FACES = {};
  function reg(key, match, html){ FACES[key] = { match: match, html: html }; }

  var SUITS = [
    { p:'bam', cls:'c-bam', ic:IC.bam },
    { p:'cir', cls:'c-cir', ic:IC.cir },
    { p:'chr', cls:'c-chr', ic:IC.chr }
  ];
  SUITS.forEach(function(s){
    for(var r=1;r<=9;r++){
      var key = s.p + r;
      reg(key, key,
        '<div class="face num '+s.cls+'"><span class="rank">'+r+'</span>'+s.ic+'</div>');
    }
  });
  // Vindar (svenska väderstreck)
  [['w-o','Ö','ÖST'],['w-s','S','SYD'],['w-v','V','VÄST'],['w-n','N','NORR']].forEach(function(w){
    reg(w[0], w[0],
      '<div class="face wind c-wind"><span class="rank">'+w[1]+'</span><span class="lbl">'+w[2]+'</span></div>');
  });
  // Drakar
  reg('d-r','d-r','<div class="face">'+DR.r+'</div>');
  reg('d-g','d-g','<div class="face">'+DR.g+'</div>');
  reg('d-w','d-w','<div class="face">'+DR.w+'</div>');
  // Blommor (match: "flower") & årstider (match: "season")
  for(var i=1;i<=4;i++){
    reg('fl'+i,'flower','<div class="face">'+FL[i]+'<span class="bonus-bar" style="background:var(--gold)"></span></div>');
    reg('se'+i,'season','<div class="face">'+SE[i]+'<span class="bonus-bar" style="background:var(--teal)"></span></div>');
  }

  // Par för generering (72 par = 144 brickor)
  function buildPairs(){
    var pairs = [];
    SUITS.forEach(function(s){
      for(var r=1;r<=9;r++){ var k=s.p+r; pairs.push([k,k]); pairs.push([k,k]); }
    });
    ['w-o','w-s','w-v','w-n','d-r','d-g','d-w'].forEach(function(k){ pairs.push([k,k]); pairs.push([k,k]); });
    pairs.push(['fl1','fl2']); pairs.push(['fl3','fl4']);
    pairs.push(['se1','se2']); pairs.push(['se3','se4']);
    return pairs; // 27*2 + 7*2 + 4 = 72
  }

  // Bygg en blandad pool med exakt nPairs par (upprepar standardleken vid behov)
  function makePool(nPairs){
    var tpl = buildPairs(), pool = tpl.slice();
    while(pool.length < nPairs) pool = pool.concat(tpl);
    shuffle(pool);
    return pool.slice(0, nPairs);
  }

  /* ---------- Layouter (mönster + storlekar) ---------- */
  // Stapla ett fotavtryck lager på lager via erosion (behåll bara celler
  // med alla 4 grannar). Ger heltalsjusterade lager med exponerad kant
  // runt varje våning → gott om fria brickor och en tydlig 3D-trappa.
  function stackEroded(cells){
    var layers = [cells], P = [];
    while(true){
      var prev = layers[layers.length-1], s = {};
      prev.forEach(function(c){ s[c[0]+','+c[1]] = 1; });
      var next = prev.filter(function(c){
        return s[(c[0]-1)+','+c[1]] && s[(c[0]+1)+','+c[1]] &&
               s[c[0]+','+(c[1]-1)] && s[c[0]+','+(c[1]+1)];
      });
      if(!next.length) break;
      layers.push(next);
    }
    layers.forEach(function(cs, z){ cs.forEach(function(c){ P.push({ z:z, x:c[0], y:c[1] }); }); });
    return P;
  }
  function rect(w,h){ var c=[]; for(var x=0;x<w;x++) for(var y=0;y<h;y++) c.push([x,y]); return stackEroded(c); }
  function diamond(r){ var c=[]; for(var x=-r;x<=r;x++) for(var y=-r;y<=r;y++) if(Math.abs(x)+Math.abs(y)<=r) c.push([x+r,y+r]); return stackEroded(c); }

  // Klassisk sköldpadda (144, halvstegsförskjutna huvud/svans/topp)
  function buildTurtle(){
    var P=[]; function add(z,x,y){ P.push({z:z,x:x,y:y}); }
    var rows = { 0:[1,12], 1:[3,10], 2:[2,11], 3:[1,12], 4:[1,12], 5:[2,11], 6:[3,10], 7:[1,12] };
    for(var y=0;y<=7;y++){ var r=rows[y]; for(var x=r[0];x<=r[1];x++) add(0,x,y); }
    add(0,13,3.5); add(0,0,3.5); add(0,-1,3.5);
    for(var x1=4;x1<=9;x1++) for(var y1=1;y1<=6;y1++) add(1,x1,y1);
    for(var x2=5;x2<=8;x2++) for(var y2=2;y2<=5;y2++) add(2,x2,y2);
    for(var x3=6;x3<=7;x3++) for(var y3=3;y3<=4;y3++) add(3,x3,y3);
    add(4,6.5,3.5);
    return P;
  }

  // säkerställ jämnt antal (ta bort en topp-bricka om udda)
  function trimEven(P){
    if(P.length % 2 === 1){ P = P.slice(); var hi=0; for(var i=1;i<P.length;i++) if(P[i].z>P[hi].z) hi=i; P.splice(hi,1); }
    return P;
  }

  // Former hålls smala (få kolumner) och gärna höga → större brickor och
  // mindre tomrum över/under på en stående mobil.
  var LAYOUTS = {
    liten: [
      { id:'liten-torn',    name:'Torn',    build:function(){ return rect(6,6); } },
      { id:'liten-diamant', name:'Diamant', build:function(){ return diamond(3); } },
      { id:'liten-pelare',  name:'Pelare',  build:function(){ return rect(4,7); } }
    ],
    mellan: [
      { id:'mellan-pyramid', name:'Pyramid', build:function(){ return rect(6,8); } },
      { id:'mellan-diamant', name:'Diamant', build:function(){ return diamond(4); } },
      { id:'mellan-torn',    name:'Torn',    build:function(){ return rect(7,7); } }
    ],
    stor: [
      { id:'stor-skoldpadda', name:'Sköldpadda', build:buildTurtle },
      { id:'stor-hoghus',     name:'Höghus',     build:function(){ return rect(6,10); } },
      { id:'stor-torn',       name:'Torn',       build:function(){ return rect(8,8); } }
    ]
  };
  // trimma till en multipel av m (2 för par-läge, 3 för Tile Match)
  function trimTo(P, m){
    P = P.slice();
    while(P.length % m !== 0){ var hi=0; for(var i=1;i<P.length;i++) if(P[i].z>P[hi].z) hi=i; P.splice(hi,1); }
    return P;
  }
  // förberäkna antal brickor per layout och läge (till menyn)
  Object.keys(LAYOUTS).forEach(function(sz){
    LAYOUTS[sz].forEach(function(l){ var raw=l.build(); l.n2=trimTo(raw,2).length; l.n3=trimTo(raw,3).length; l.count=l.n2; });
  });

  /* ---------- Frihetslogik ---------- */
  // en position täcks om någon närvarande bricka i lagret ovanför överlappar
  function covered(pos, present, positions){
    for(var i=0;i<positions.length;i++){
      if(!present[i]) continue;
      var q = positions[i];
      if(q.z === pos.z + 1 && Math.abs(q.x - pos.x) < 0.9 && Math.abs(q.y - pos.y) < 0.9) return true;
    }
    return false;
  }
  function sideOpen(pos, present, positions, dir){ // dir = -1 vänster, +1 höger
    for(var i=0;i<positions.length;i++){
      if(!present[i]) continue;
      var q = positions[i];
      if(q.z !== pos.z) continue;
      var dx = (pos.x - q.x) * dir;      // >0 om q ligger i riktningen dir
      if(dx > 0.1 && dx < 1.1 && Math.abs(q.y - pos.y) < 0.9) return false;
    }
    return true;
  }
  function isFree(idx, present, positions){
    var pos = positions[idx];
    if(covered(pos, present, positions)) return false;
    return sideOpen(pos, present, positions, -1) || sideOpen(pos, present, positions, +1);
  }

  // Seedbar slumpgenerator (mulberry32) — låter en hel giv (mönster +
  // brickornas placering) återskapas exakt från ett litet fröNumber, vilket
  // är grunden för delbara givar. rng() används normalt = Math.random.
  function mulberry32(seed){
    return function(){
      seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
      var t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  var rng = Math.random;
  function seedRngFrom(n){ rng = mulberry32(n >>> 0); }
  function unseedRng(){ rng = Math.random; }

  function shuffle(a){
    for(var i=a.length-1;i>0;i--){ var j=(rng()*(i+1))|0; var t=a[i]; a[i]=a[j]; a[j]=t; }
    return a;
  }

  /* ---------- Generering av lösbar giv ---------- */
  function generate(positions){
    var n = positions.length;
    for(var attempt=0; attempt<400; attempt++){
      var present = new Array(n).fill(true);   // "ännu ej placerad" = närvarande i strukturen
      var assign = new Array(n).fill(null);
      var pool = makePool(n/2);
      var ok = true, placed = 0;
      while(placed < n){
        // fria positioner bland ännu ej tilldelade
        var free = [];
        for(var i=0;i<n;i++) if(present[i] && isFree(i, present, positions)) free.push(i);
        if(free.length < 2){ ok = false; break; }
        shuffle(free);
        var a = free[0], b = free[1];
        var pair = pool.pop();
        assign[a] = pair[0]; assign[b] = pair[1];
        present[a] = false; present[b] = false;
        placed += 2;
      }
      if(ok) return assign;
    }
    return null; // ytterst osannolikt
  }

  // Bygg par av matchande brickor (samma "grupp" som spelet matchar mot,
  // t.ex. matchar alla fyra blommor varandra) utifrån de brickor som
  // faktiskt finns kvar på brädet — sammansättningen ändras alltså inte.
  function subsetPairPool(idxs){
    var byGroup = {};
    idxs.forEach(function(i){
      var id = state.faces[i], key = FACES[id].match;
      (byGroup[key] = byGroup[key] || []).push(id);
    });
    var pairs = [];
    Object.keys(byGroup).forEach(function(key){
      var arr = shuffle(byGroup[key].slice());
      for(var i=0;i+1<arr.length;i+=2) pairs.push([arr[i], arr[i+1]]);
    });
    return pairs;
  }

  // Blanda kvarvarande brickor till en garanterat lösbar uppställning —
  // samma bakvända generering som en ny giv, men begränsad till de
  // positioner som fortfarande har brickor kvar. Förhindrar att t.ex.
  // de två sista brickorna råkar hamna staplade (omöjliga att matcha).
  function generateSolvableSubset(idxs){
    var template = subsetPairPool(idxs);
    for(var attempt=0; attempt<400; attempt++){
      var present = new Array(N).fill(false);
      idxs.forEach(function(i){ present[i] = true; });
      var assign = {}, pool = shuffle(template.slice());
      var ok = true, placed = 0;
      while(placed < idxs.length){
        var free = [];
        for(var k=0;k<idxs.length;k++){ var i=idxs[k]; if(present[i] && isFree(i, present, POS)) free.push(i); }
        if(free.length < 2){ ok = false; break; }
        shuffle(free);
        var a = free[0], b = free[1], pair = pool.pop();
        assign[a] = pair[0]; assign[b] = pair[1];
        present[a] = false; present[b] = false;
        placed += 2;
      }
      if(ok) return assign;
    }
    return null;
  }

  // Tile Match: distinkta brick-id (trippel = tre identiska)
  function tmIds(nTriples){
    var ids = [];
    SUITS.forEach(function(s){ for(var r=1;r<=9;r++) ids.push(s.p+r); });
    ['w-o','w-s','w-v','w-n','d-r','d-g','d-w'].forEach(function(k){ ids.push(k); });
    for(var i=1;i<=4;i++){ ids.push('fl'+i); ids.push('se'+i); }  // 42 distinkta id
    var pool = [];
    while(pool.length < nTriples) pool = pool.concat(ids);
    shuffle(pool);
    return pool.slice(0, nTriples);
  }
  // Bakvänd generering med trippel → garanterat lösbar (facket behöver aldrig >3)
  function generateTriples(positions){
    var n = positions.length;
    for(var attempt=0; attempt<400; attempt++){
      var present = new Array(n).fill(true), assign = new Array(n).fill(null);
      var pool = tmIds(n/3), ok = true, placed = 0;
      while(placed < n){
        var free = [];
        for(var i=0;i<n;i++) if(present[i] && isFree(i, present, positions)) free.push(i);
        if(free.length < 3){ ok = false; break; }
        shuffle(free);
        var a=free[0], b=free[1], c=free[2], id=pool.pop();
        assign[a]=id; assign[b]=id; assign[c]=id;
        present[a]=false; present[b]=false; present[c]=false;
        placed += 3;
      }
      if(ok) return assign;
    }
    return null;
  }

  /* ============================================================
     Speltillstånd
     ============================================================ */
  var POS = [], N = 0, minX = 0, minY = 0, maxX = 0, maxY = 0;
  function setLayout(positions){
    POS = positions; N = positions.length;
    minX = 1e9; minY = 1e9; maxX = -1e9; maxY = -1e9;
    POS.forEach(function(p){ if(p.x<minX)minX=p.x; if(p.y<minY)minY=p.y; if(p.x>maxX)maxX=p.x; if(p.y>maxY)maxY=p.y; });
    buildBoard();
  }

  var boardEl = document.getElementById('board');
  var wrapEl  = document.getElementById('boardWrap');
  var tileEls = [];   // DOM per position

  var state = null;   // { faces:[], removed:[bool], undo:[[a,b]], moves, seconds, done }
  var selected = -1;
  var hintPair = null, hintTimer = null;
  var timerId = null;

  var SAVE_KEY = 'mahjong:save', BEST_PFX = 'mahjong:best:', CFG_KEY = 'mahjong:cfg';
  var cfg = (function(){
    var c = null; try { c = JSON.parse(localStorage.getItem(CFG_KEY) || 'null'); } catch(e){}
    c = c || {};
    if(['liten','mellan','stor'].indexOf(c.size) < 0) c.size = 'mellan';
    if(!c.pattern) c.pattern = 'slumpa';
    if(typeof c.sound !== 'boolean') c.sound = true;
    if(['classic','tilematch'].indexOf(c.mode) < 0) c.mode = 'classic';
    return c;
  })();
  function saveCfg(){ try { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); } catch(e){} }

  function present(i){ return !state.removed[i]; }
  function freeNow(i){ return present(i) && isFree(i, state.removed.map(function(r){return !r;}), POS); }

  // snabbare frihetskoll som använder removed direkt
  function isFreeIdx(idx){
    if(state.removed[idx]) return false;
    // I klassiskt läge har varje matchningsgrupp alltid ett jämnt antal
    // brickor kvar (par tas alltid bort två och två), så när exakt två
    // brickor återstår totalt matchar de garanterat varandra. Gör dem då
    // alltid valbara — annars kan de råka ligga fysiskt staplade (den ena
    // ovanpå den andra) och bli helt omöjliga att plocka samtidigt, oavsett
    // hur många gånger man blandar (en blandning byter bara symboler, inte
    // positioner, så den kan aldrig lösa upp en sådan geometrisk låsning).
    if(state.mode !== 'tilematch'){
      var leftOnBoard = 0;
      for(var r=0;r<N;r++){ if(!state.removed[r]){ leftOnBoard++; if(leftOnBoard>2) break; } }
      if(leftOnBoard <= 2) return true;
    }
    var pos = POS[idx];
    // täckt?
    for(var i=0;i<N;i++){
      if(state.removed[i]) continue;
      var q = POS[i];
      if(q.z === pos.z+1 && Math.abs(q.x-pos.x)<0.9 && Math.abs(q.y-pos.y)<0.9) return false;
    }
    var leftBlocked=false, rightBlocked=false;
    for(var j=0;j<N;j++){
      if(state.removed[j] || j===idx) continue;
      var r = POS[j];
      if(r.z !== pos.z) continue;
      if(Math.abs(r.y-pos.y) >= 0.9) continue;
      var d = pos.x - r.x;
      if(d>0.1 && d<1.1) leftBlocked = true;
      if(d<-0.1 && d>-1.1) rightBlocked = true;
    }
    return !leftBlocked || !rightBlocked;
  }

  function matchKey(i){ return FACES[state.faces[i]].match; }
  function matches(i,j){ return i!==j && matchKey(i)===matchKey(j); }

  /* ---------- Rendering ---------- */
  function buildBoard(){
    boardEl.innerHTML = '';
    boardEl.style.setProperty('--tw', TW + 'px');
    boardEl.style.setProperty('--th', TH + 'px');
    tileEls = [];
    // rita underst först (z låg, y låg) så DOM-ordning ~ staplingsordning
    var order = POS.map(function(_,i){return i;}).sort(function(a,b){
      var pa=POS[a], pb=POS[b];
      if(pa.z!==pb.z) return pa.z-pb.z;
      if(pa.y!==pb.y) return pa.y-pb.y;
      return pa.x-pb.x;
    });
    order.forEach(function(i){
      var p = POS[i];
      var el = document.createElement('div');
      el.className = 'tile';
      el.dataset.idx = i;
      var left = MARGIN + (p.x - minX)*TW - p.z*DX;
      var top  = MARGIN + (p.y - minY)*TH - p.z*DY;
      el.style.left = left + 'px';
      el.style.top  = top + 'px';
      el.style.zIndex = (p.z*1000 + Math.round((p.y-minY)*2)*20 + Math.round((p.x-minX)*2));
      boardEl.appendChild(el);
      tileEls[i] = el;
    });
    var bw = MARGIN + (maxX - minX + 1)*TW + 6;
    var bh = MARGIN + (maxY - minY + 1)*TH + 8;
    boardEl.style.width = bw + 'px';
    boardEl.style.height = bh + 'px';
    fitBoard();
  }

  function paintFaces(){
    for(var i=0;i<N;i++){
      tileEls[i].innerHTML = FACES[state.faces[i]].html;
    }
  }

  function fitBoard(){
    var bw = parseFloat(boardEl.style.width), bh = parseFloat(boardEl.style.height);
    if(!bw || !bh) return;
    var aw = wrapEl.clientWidth, ah = wrapEl.clientHeight;
    var s = Math.min((aw - 8)/bw, (ah - 8)/bh);
    s = Math.min(s, 1.7);   // tillåt större brickor på små bräden
    var tx = (aw - bw*s)/2, ty = (ah - bh*s)/2;
    boardEl.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + s + ')';
  }

  function refresh(){
    for(var i=0;i<N;i++){
      var el = tileEls[i];
      if(state.removed[i]){ el.classList.add('gone'); el.classList.remove('free','blocked','selected','hint'); continue; }
      el.classList.remove('gone');
      var free = isFreeIdx(i);
      el.classList.toggle('free', free);
      el.classList.toggle('blocked', !free);
      el.classList.toggle('selected', i===selected);
    }
    document.getElementById('statMoves').textContent = state.moves;
    var left = 0; for(var k=0;k<N;k++) if(!state.removed[k]) left++;
    document.getElementById('statPairs').textContent = state.mode === 'tilematch' ? left : ((left/2)|0);
    document.getElementById('btnUndo').disabled = state.undo.length===0;
  }

  /* ---------- Interaktion ---------- */
  function onBoardClick(e){
    var t = e.target.closest('.tile');
    if(!t) return;
    var i = +t.dataset.idx;
    if(state.done || state.removed[i] || !isFreeIdx(i)) return;
    if(state.mode === 'tilematch'){ pickTile(i); return; }
    clearHint();
    if(selected === -1){ selected = i; sfx('select'); refresh(); return; }
    if(selected === i){ selected = -1; refresh(); return; }
    if(matches(selected, i)){
      removePair(selected, i);
      selected = -1;
    } else {
      selected = i; sfx('invalid'); refresh();
    }
  }

  function removePair(a, b){
    state.removed[a] = true; state.removed[b] = true;
    state.undo.push([a,b]);
    state.moves++;
    // combo: matchningar i följd inom ett tidsfönster
    var now = Date.now();
    state.combo = (state.lastMatch && now - state.lastMatch < 3000) ? (state.combo||0)+1 : 1;
    state.lastMatch = now;
    noteCombo(state.combo);
    if(navigator.vibrate) try { navigator.vibrate(12); } catch(e){}
    sfx('match', state.combo);
    refresh();
    save();
    // vinst?
    var left = 0; for(var k=0;k<N;k++) if(!state.removed[k]) left++;
    if(left === 0){ win(); return; }
    praiseAfterMatch(left);
    // dödläge?
    if(!hasMove()){
      sfx('deadlock');
      setTimeout(function(){ toast('Inga drag kvar — tryck Blanda'); }, 300);
    }
  }

  // Beröm: combo-milstolpar + framstegshälsningar (sparsamt, inte varje drag)
  var COMBO_MSG = { 3:'Bra! ×3 🔥', 5:'Snyggt! ×5 🔥', 8:'Grymt! ×8 ⚡', 12:'Otroligt! ×12 🌟', 16:'Magiskt! ×16 ✨' };
  function praiseAfterMatch(left){
    var total = N/2, said = false;
    if(COMBO_MSG[state.combo]){ celebrate(COMBO_MSG[state.combo]); said = true; }
    if(!state.flHalf && left <= total/2 && left > 3){ state.flHalf = true; if(!said){ celebrate('Halvvägs! 💪'); said = true; } }
    if(left === 3 && !state.flNear){ state.flNear = true; if(!said) celebrate('Snart klart!'); }
  }

  /* ---------- Tile Match ---------- */
  function faceId(idx){ return state.faces[idx]; }
  function renderTray(){
    var tray = document.getElementById('tray');
    if(!state || state.mode !== 'tilematch'){ return; }
    var html = '';
    for(var s=0;s<7;s++){
      if(s < state.tray.length){
        var ix = state.tray[s];
        html += '<div class="tray-slot filled"><div class="mini-tile">' + FACES[state.faces[ix]].html + '</div></div>';
      } else {
        html += '<div class="tray-slot"></div>';
      }
    }
    tray.innerHTML = html;
  }
  function resolveTray(id){
    var same = state.tray.filter(function(ix){ return state.faces[ix] === id; });
    if(same.length >= 3){
      var three = same.slice(0,3);
      state.tray = state.tray.filter(function(ix){ return three.indexOf(ix) < 0; });
      return true;
    }
    return false;
  }
  function pickTile(idx){
    if(state.done) return;
    // ögonblicksbild för ångra
    state.undo.push({ removed: state.removed.slice(), tray: state.tray.slice(), moves: state.moves });
    if(state.undo.length > 300) state.undo.shift();
    state.removed[idx] = true;
    state.tray.push(idx);
    state.moves++;
    state.tray.sort(function(a,b){ var fa=state.faces[a], fb=state.faces[b]; return fa<fb?-1:fa>fb?1:0; });
    if(navigator.vibrate) try { navigator.vibrate(8); } catch(e){}
    var cleared = resolveTray(state.faces[idx]);
    if(cleared){
      var now = Date.now();
      state.combo = (state.lastMatch && now - state.lastMatch < 4000) ? (state.combo||0)+1 : 1;
      state.lastMatch = now;
      noteCombo(state.combo);
      sfx('match', state.combo);
    } else {
      sfx('select');
    }
    refresh(); renderTray(); save();
    var collected = 0; for(var k=0;k<N;k++) if(state.removed[k]) collected++;
    if(collected === N && state.tray.length === 0){ win(); return; }
    if(cleared && COMBO_MSG[state.combo]) celebrate(COMBO_MSG[state.combo]);
    if(state.tray.length >= 7){ lose(); }
  }
  function lose(){
    state.done = true;
    if(timerId) clearInterval(timerId);
    recordStat(state.mode, false, {});
    var panel = document.getElementById('panel');
    panel.innerHTML =
      '<div class="emoji">🚫</div>' +
      '<h2>Facket fullt!</h2>' +
      '<p>Inga fler platser i facket. Ångra ett drag och försök igen, eller börja om.</p>' +
      '<button id="pUndoLose">↩︎ Ångra drag</button>' +
      '<button id="pNewLose" class="ghost">Ny giv</button>';
    document.getElementById('overlay').classList.add('show');
    document.getElementById('pUndoLose').onclick = function(){ hideOverlay(); state.done = false; startTimer(); undo(); };
    document.getElementById('pNewLose').onclick = function(){ hideOverlay(); newGame(); };
    sfx('deadlock');
    if(navigator.vibrate) try { navigator.vibrate([40,60,40]); } catch(e){}
  }

  function undo(){
    if(!state.undo.length) return;
    if(state.mode === 'tilematch'){
      var snap = state.undo.pop();
      state.removed = snap.removed; state.tray = snap.tray; state.moves = snap.moves;
      state.combo = 0; state.lastMatch = 0;
      sfx('undo'); refresh(); renderTray(); save();
      return;
    }
    var pair = state.undo.pop();
    state.removed[pair[0]] = false; state.removed[pair[1]] = false;
    state.moves = Math.max(0, state.moves-1);
    state.combo = 0; state.lastMatch = 0;
    selected = -1; clearHint(); sfx('undo');
    refresh(); save();
  }

  /* ---------- Tips & dödläge ---------- */
  function findMove(){
    var freeList = [];
    for(var i=0;i<N;i++) if(!state.removed[i] && isFreeIdx(i)) freeList.push(i);
    for(var a=0;a<freeList.length;a++)
      for(var b=a+1;b<freeList.length;b++)
        if(matches(freeList[a], freeList[b])) return [freeList[a], freeList[b]];
    return null;
  }
  function hasMove(){ return !!findMove(); }

  function hint(){
    clearHint();
    var m = findMove();
    if(!m){ toast('Inga drag — tryck Blanda'); return; }
    hintPair = m;
    tileEls[m[0]].classList.add('hint');
    tileEls[m[1]].classList.add('hint');
    sfx('hint');
    state.tips = (state.tips||0) + 1; save();
    updateChallengeStat();
    toast('Tips – +' + PEN_TIP + ' s på sluttiden');
    hintTimer = setTimeout(clearHint, 2200);
  }
  function clearHint(){
    if(hintPair){ tileEls[hintPair[0]].classList.remove('hint'); tileEls[hintPair[1]].classList.remove('hint'); hintPair=null; }
    if(hintTimer){ clearTimeout(hintTimer); hintTimer=null; }
  }

  // Blanda om kvarvarande brickor. I klassiskt läge garanteras hela
  // återstoden vara lösbar (annars kan t.ex. de två sista brickorna
  // råka hamna staplade och bli omöjliga att matcha). Tile Match kräver
  // aldrig två samtidigt fria brickor, så en ren omkastning räcker där.
  function shuffleRemaining(){
    if(state.done) return;
    var idxs = []; for(var i=0;i<N;i++) if(!state.removed[i]) idxs.push(i);
    if(idxs.length < 2){ return; }
    if(state.mode === 'tilematch'){
      var faces = idxs.map(function(i){ return state.faces[i]; });
      shuffle(faces);
      for(var k=0;k<idxs.length;k++) state.faces[idxs[k]] = faces[k];
    } else {
      var assign = generateSolvableSubset(idxs);
      if(assign){
        idxs.forEach(function(i){ state.faces[i] = assign[i]; });
      } else {
        // ytterst osannolikt: reservläge som tidigare (garanterar minst ett drag)
        var faces2 = idxs.map(function(i){ return state.faces[i]; });
        for(var attempt=0; attempt<60; attempt++){
          shuffle(faces2);
          for(var m=0;m<idxs.length;m++) state.faces[idxs[m]] = faces2[m];
          if(hasMove()) break;
        }
      }
    }
    state.shuffles = (state.shuffles||0) + 1;
    state.combo = 0; state.lastMatch = 0;
    selected = -1; clearHint(); sfx('shuffle'); paintFaces(); refresh(); save();
    updateChallengeStat();
    toast('Blandat – +' + PEN_SHUFFLE + ' s på sluttiden');
  }

  /* ---------- Timer ---------- */
  function fmt(s){ var m=(s/60)|0; var r=s%60; return m + ':' + (r<10?'0':'') + r; }
  function tick(){ if(state && !state.done){ state.seconds++; document.getElementById('statTime').textContent = fmt(state.seconds); updateChallengeStat(); } }
  function startTimer(){ if(timerId) clearInterval(timerId); timerId = setInterval(tick, 1000); }

  /* ---------- Persistens ---------- */
  function save(){
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        positions: state.positions, faces: state.faces, removed: state.removed,
        tray: state.tray, undo: state.undo, moves: state.moves, seconds: state.seconds, mode: state.mode,
        tips: state.tips, shuffles: state.shuffles, seed: state.seed, fromShare: state.fromShare
      }));
    } catch(e){}
  }
  function clearSave(){ try { localStorage.removeItem(SAVE_KEY); } catch(e){} }
  function loadSave(){
    try {
      var s = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null');
      if(!s || !s.positions || !s.faces || s.faces.length !== s.positions.length) return null;
      for(var i=0;i<s.faces.length;i++) if(!FACES[s.faces[i]]) return null;
      return { positions:s.positions, faces:s.faces, removed:s.removed||new Array(s.faces.length).fill(false),
               tray:s.tray||[], undo:s.undo||[], moves:s.moves||0, seconds:s.seconds||0, done:false, mode:s.mode||'classic',
               tips:s.tips||0, shuffles:s.shuffles||0, seed:s.seed||null, fromShare:!!s.fromShare };
    } catch(e){ return null; }
  }
  function getBest(mode,n){ try { return parseInt(localStorage.getItem(BEST_PFX+mode+':'+n)||'0',10)||0; } catch(e){ return 0; } }
  function setBest(mode,n,s){ try { localStorage.setItem(BEST_PFX+mode+':'+n, String(s)); } catch(e){} }

  /* ---------- Statistik & märken ---------- */
  var STATS_KEY = 'mahjong:stats';
  var stats = (function(){
    var s = null; try { s = JSON.parse(localStorage.getItem(STATS_KEY) || 'null'); } catch(e){}
    s = s || {};
    s.started = s.started||0; s.wins = s.wins||0; s.streak = s.streak||0; s.bestStreak = s.bestStreak||0;
    s.bestCombo = s.bestCombo||0; s.byMode = s.byMode||{}; s.badges = s.badges||{};
    s.fastWin = !!s.fastWin; s.big144 = !!s.big144; s.dailyDates = s.dailyDates||{};
    return s;
  })();
  function saveStats(){ try { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); } catch(e){} }
  function statStart(mode){
    stats.started++;
    stats.byMode[mode] = stats.byMode[mode] || { started:0, wins:0 };
    stats.byMode[mode].started++;
    saveStats();
  }
  function noteCombo(c){ if(c > stats.bestCombo){ stats.bestCombo = c; saveStats(); checkBadges(); } }
  function recordStat(mode, won, ctx){
    ctx = ctx || {};
    var bm = stats.byMode[mode] = stats.byMode[mode] || { started:0, wins:0 };
    if(won){
      stats.wins++; bm.wins++; stats.streak++;
      if(stats.streak > stats.bestStreak) stats.bestStreak = stats.streak;
      if(ctx.seconds && ctx.seconds < 60) stats.fastWin = true;
      if(ctx.tiles === 144) stats.big144 = true;
      if(ctx.isDaily && ctx.dateStr) stats.dailyDates[ctx.dateStr] = true;
    } else {
      stats.streak = 0;
    }
    saveStats();
    checkBadges();
  }
  var BADGES = [
    { id:'first',     icon:'🎉', name:'Första segern', desc:'Vinn ditt första spel',      test:function(){ return stats.wins >= 1; } },
    { id:'ten',       icon:'🏅', name:'Rutinerad',     desc:'Vinn 10 spel totalt',        test:function(){ return stats.wins >= 10; } },
    { id:'fifty',     icon:'👑', name:'Mästare',       desc:'Vinn 50 spel totalt',        test:function(){ return stats.wins >= 50; } },
    { id:'streak3',   icon:'🔥', name:'På rad',        desc:'Vinn 3 spel i rad',          test:function(){ return stats.bestStreak >= 3; } },
    { id:'combo8',    icon:'⚡', name:'Combo-mästare', desc:'Nå combo ×8',                test:function(){ return stats.bestCombo >= 8; } },
    { id:'fast',      icon:'⏱️', name:'Blixtsnabb',    desc:'Vinn på under 1 minut',      test:function(){ return stats.fastWin; } },
    { id:'big',       icon:'🐢', name:'Sköldpaddan',   desc:'Vinn ett Stor-spel (144)',   test:function(){ return stats.big144; } },
    { id:'tilematch', icon:'🀄', name:'Tre lika',      desc:'Vinn ett Tile Match-spel',   test:function(){ return stats.byMode.tilematch && stats.byMode.tilematch.wins >= 1; } },
    { id:'daily1',    icon:'🗓️', name:'Dagens utmaning', desc:'Klara en daglig utmaning', test:function(){ return Object.keys(stats.dailyDates||{}).length >= 1; } },
    { id:'daily7',    icon:'📅', name:'Vardagshjälte',  desc:'Klara 7 dagliga utmaningar', test:function(){ return Object.keys(stats.dailyDates||{}).length >= 7; } }
  ];
  function checkBadges(){
    var newly = [];
    BADGES.forEach(function(b){ if(!stats.badges[b.id] && b.test()){ stats.badges[b.id] = true; newly.push(b); } });
    if(newly.length){
      saveStats();
      newly.forEach(function(b,i){ setTimeout(function(){ celebrate('Nytt märke! ' + b.icon + ' ' + b.name); }, 900 + i*1600); });
    }
  }

  /* ---------- Global topplista (Railway + Supabase) ---------- */
  // Sätt din Railway-URL här (utan avslutande snedstreck). Tom = topplista av.
  var LEADERBOARD_API = 'https://games-nordhammer-production.up.railway.app';
  var NAME_KEY = 'mahjong:name';
  function apiBase(){
    try { return (localStorage.getItem('mahjong:api') || LEADERBOARD_API || '').replace(/\/+$/,''); }
    catch(e){ return LEADERBOARD_API; }
  }
  function hasLeaderboard(){ return !!apiBase(); }
  function getName(){ try { return localStorage.getItem(NAME_KEY) || ''; } catch(e){ return ''; } }
  function setName(n){ try { localStorage.setItem(NAME_KEY, n); } catch(e){} }
  function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  /* ---------- Delbara givar (seed-kod) ---------- */
  // En giv kodas som base64url({p:mönster-id, m:läge, r:rng-frö}).
  // Mönster-id är globalt unikt och pekar ut både storlek och form, så
  // koden är självständig och stabil även om LAYOUTS ändras i framtiden.
  function b64urlEncode(str){ return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
  function b64urlDecode(str){ str = str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length % 4) str += '='; return atob(str); }
  function findLayoutById(id){
    var sizes = Object.keys(LAYOUTS);
    for(var i=0;i<sizes.length;i++){
      var found = LAYOUTS[sizes[i]].filter(function(l){ return l.id === id; })[0];
      if(found) return found;
    }
    return null;
  }
  function makeSeedCode(patternId, mode, rngSeed){
    try { return b64urlEncode(JSON.stringify({ p: patternId, m: mode, r: rngSeed })); } catch(e){ return null; }
  }
  function parseSeedCode(code){
    try {
      var obj = JSON.parse(b64urlDecode(code));
      if(!obj || typeof obj.p !== 'string' || typeof obj.r !== 'number') return null;
      if(['classic','tilematch'].indexOf(obj.m) < 0) return null;
      var layoutDef = findLayoutById(obj.p);
      if(!layoutDef) return null;
      return { layoutDef: layoutDef, mode: obj.m, rngSeed: obj.r };
    } catch(e){ return null; }
  }
  /* ---------- Daglig utmaning ----------
     Samma giv för alla, varje dag — helt deterministisk och beräknad
     lokalt hos varje spelare (inget backend-stöd behövs för själva
     givet). Eftersom alla spelare räknar fram exakt samma seed-kod för
     dagens UTC-datum hamnar allas resultat automatiskt i samma
     per-seed-topplista via det befintliga systemet. */
  function hashStr(str){
    var h = 2166136261 >>> 0; // FNV-1a
    for(var i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
    return h >>> 0;
  }
  function todayIso(){ return new Date().toISOString().slice(0,10); } // UTC, samma dygnsgräns för alla
  function dailyChallengeInfo(dateStr){
    dateStr = dateStr || todayIso();
    var pick = hashStr('mahjong-daily-pick:' + dateStr);
    var seedNum = hashStr('mahjong-daily-seed:' + dateStr);
    var sizes = ['liten','mellan','stor'];
    var size = sizes[pick % 3];
    var mode = 'classic'; // dagens utmaning kör alltid klassiskt läge
    var list = LAYOUTS[size];
    var layoutDef = list[(pick >>> 8) % list.length];
    return { layoutDef: layoutDef, mode: mode, rngSeed: seedNum, dateStr: dateStr };
  }
  function dailySeedCode(dateStr){
    var info = dailyChallengeInfo(dateStr);
    return makeSeedCode(info.layoutDef.id, info.mode, info.rngSeed);
  }
  var SV_MONTHS = ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'];
  function formatDateSv(iso){
    var p = iso.split('-'); var d = +p[2], m = +p[1];
    return d + ' ' + (SV_MONTHS[m-1] || '') ;
  }
  function getGivParam(){ try { return new URLSearchParams(location.search).get('giv'); } catch(e){ return null; } }
  function setGivParam(code){
    try { var url = new URL(location.href); url.searchParams.set('giv', code); history.replaceState(null, '', url.toString()); } catch(e){}
  }
  function clearGivParam(){
    try {
      if(!new URLSearchParams(location.search).has('giv')) return;
      var url = new URL(location.href); url.searchParams.delete('giv'); history.replaceState(null, '', url.toString());
    } catch(e){}
  }
  function shareUrlFor(code){
    var url = new URL(location.href); url.search = ''; url.hash = ''; url.searchParams.set('giv', code); return url.toString();
  }
  // btn = knappen som klickades (valfri) — ger omedelbar, svårmissad
  // feedback direkt på knappen, utöver notisen (som annars är lätt att
  // missa om den hamnar bakom en fortsatt öppen panel).
  function shareCurrentGame(btn){
    if(!state || !state.seed) return;
    var url = shareUrlFor(state.seed);
    function flashCopied(){
      toast('Länk kopierad!');
      if(!btn) return;
      var orig = btn.textContent;
      btn.textContent = '✓ Länk kopierad!';
      btn.disabled = true;
      setTimeout(function(){ btn.textContent = orig; btn.disabled = false; }, 1800);
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(flashCopied).catch(function(){ showShareFallback(url); });
    } else {
      showShareFallback(url);
    }
  }
  function showShareFallback(url){
    var panel = document.getElementById('panel');
    panel.innerHTML =
      '<div class="emoji">🔗</div><h2>Dela giv</h2>' +
      '<p>Kopiera länken och skicka till en vän — de spelar exakt samma bräde.</p>' +
      '<input id="shareUrl" class="lb-input wide-select" style="text-align:center" readonly value="'+esc(url)+'">' +
      '<button id="shareCopy">Kopiera länk</button>' +
      '<button id="shareClose" class="ghost">Stäng</button>';
    document.getElementById('overlay').classList.add('show');
    var inp = document.getElementById('shareUrl');
    setTimeout(function(){ try { inp.focus(); inp.select(); } catch(e){} }, 50);
    document.getElementById('shareCopy').onclick = function(){
      try { inp.focus(); inp.select(); document.execCommand('copy'); toast('Länk kopierad!'); } catch(e){}
    };
    document.getElementById('shareClose').onclick = hideOverlay;
  }

  function lbFetch(tiles, mode, cb){
    var base = apiBase(); if(!base) return cb(new Error('ingen topplista'));
    fetch(base + '/api/leaderboard?tiles=' + tiles + '&mode=' + (mode||'classic') + '&limit=20')
      .then(function(r){ return r.json(); })
      .then(function(d){ cb(null, (d && d.scores) || []); })
      .catch(function(e){ cb(e); });
  }
  function lbSubmit(payload, cb){
    var base = apiBase(); if(!base) return cb && cb(new Error('ingen topplista'));
    fetch(base + '/api/scores', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) })
      .then(function(r){ return r.json(); })
      .then(function(d){ cb && cb(d && d.error ? new Error(d.error) : null, d); })
      .catch(function(e){ cb && cb(e); });
  }
  function lbRenderList(el, list, myName){
    if(!list || !list.length){ el.innerHTML = '<div class="lb-empty">Var först på listan!</div>'; return; }
    var medals = ['🥇','🥈','🥉'];
    el.innerHTML = list.map(function(s,i){
      var me = (myName && s.name === myName) ? ' me' : '';
      var rank = i < 3 ? medals[i] : (i+1);
      return '<div class="lb-row'+me+'"><span class="lb-rank">'+rank+'</span>' +
             '<span class="lb-name">'+esc(s.name)+'</span>' +
             '<span class="lb-time">'+fmt(s.seconds)+'</span></div>';
    }).join('');
  }
  function lbFetchBySeed(seed, cb){
    var base = apiBase(); if(!base) return cb(new Error('ingen topplista'));
    fetch(base + '/api/leaderboard?seed=' + encodeURIComponent(seed) + '&limit=20')
      .then(function(r){ return r.json(); })
      .then(function(d){ cb(null, (d && d.scores) || []); })
      .catch(function(e){ cb(e); });
  }
  function lbFetchChallenges(cb){
    var base = apiBase(); if(!base) return cb(new Error('ingen topplista'));
    fetch(base + '/api/challenges?limit=20')
      .then(function(r){ return r.json(); })
      .then(function(d){ cb(null, (d && d.challenges) || []); })
      .catch(function(e){ cb(e); });
  }
  function setupSeedLeaderboard(area, seed){
    if(!area) return;
    var icon = (seed === dailySeedCode()) ? '🗓️' : '🧩';
    area.innerHTML = '<div class="lb-title">'+icon+' Topplista för denna giv</div><div class="lb-list">Laddar…</div>';
    lbFetchBySeed(seed, function(err, list){
      var el = area.querySelector('.lb-list');
      if(!el) return;
      if(err){ el.textContent = 'Kunde inte hämta topplistan'; return; }
      lbRenderList(el, list, getName());
    });
  }

  /* ---------- Utmaning: banner + live-jämförelse mot motståndare ---------- */
  // challengeTarget = snabbaste motståndarens tid (sekunder) för denna giv,
  // hämtat en gång när utmaningen laddas. Räknas inte om under spelets gång.
  var challengeTarget = null;
  function updateChallengeBanner(){
    var bar = document.getElementById('challengeBar');
    if(!bar) return;
    challengeTarget = null;
    updateChallengeStat();
    if(!state || !state.fromShare || !hasLeaderboard()){ bar.style.display = 'none'; return; }
    var isDaily = state.seed === dailySeedCode();
    var icon = isDaily ? '🗓️' : '🧩';
    var label = isDaily ? 'Dagens utmaning' : 'Du spelar en utmaning';
    bar.style.display = 'flex';
    bar.innerHTML = icon + ' ' + label + ' · Laddar motståndare…';
    var forSeed = state.seed;
    lbFetchBySeed(forSeed, function(err, list){
      if(!state || !state.fromShare || state.seed !== forSeed) return; // spelet hann bytas medan vi väntade
      if(err){ bar.innerHTML = icon + ' ' + label; return; }
      var myName = getName();
      var others = (list || []).filter(function(s){ return s.name !== myName; });
      if(!others.length){
        bar.innerHTML = icon + ' ' + label + ' · Bli först att klara den!';
        return;
      }
      challengeTarget = others[0].seconds; // snabbast, listan är redan sorterad
      var names = others.slice(0,4).map(function(s){ return esc(s.name) + ' <b>' + fmt(s.seconds) + '</b>'; }).join(' · ');
      bar.innerHTML = icon + ' ' + (isDaily ? 'Dagens utmaning mot' : 'Utmaning mot') + ': ' + names + (others.length > 4 ? ' …' : '');
      updateChallengeStat();
    });

  function updateChallengeStat(){
    var wrap = document.getElementById('statVsWrap'), sep = document.getElementById('statVsSep');
    if(!wrap || !sep) return;
    if(!state || !state.fromShare || challengeTarget == null){ wrap.style.display = 'none'; sep.style.display = 'none'; return; }
    wrap.style.display = ''; sep.style.display = '';
    var mine = state.seconds + penaltySeconds();
    var diff = challengeTarget - mine;
    var valEl = document.getElementById('statVsVal');
    if(diff >= 0){ valEl.textContent = '−' + fmt(diff); valEl.className = ''; }
    else { valEl.textContent = '+' + fmt(-diff); valEl.className = 'vs-behind'; }
  }

  /* ---------- Vinst ---------- */
  // Tidsstraff för hjälpmedel (klockan är ärlig; påslaget läggs på sluttiden
  // som räknas mot rekord och topplista). Ångra är gratis.
  var PEN_TIP = 10, PEN_SHUFFLE = 10;
  function penaltySeconds(){ return (state.tips||0)*PEN_TIP + (state.shuffles||0)*PEN_SHUFFLE; }
  function penBreakdown(){
    var parts = [];
    if(state.tips) parts.push(state.tips + (state.tips===1 ? ' tips' : ' tips'));
    if(state.shuffles) parts.push(state.shuffles + (state.shuffles===1 ? ' blanda' : ' blandningar'));
    return parts.join(', ');
  }
  function win(){
    state.done = true;
    if(timerId) clearInterval(timerId);
    clearSave();
    var pen = penaltySeconds();
    var finalSeconds = state.seconds + pen;
    var best = getBest(state.mode, N);
    var isBest = (best === 0 || finalSeconds < best);
    if(isBest) setBest(state.mode, N, finalSeconds);
    var isDailyWin = state.fromShare && state.seed === dailySeedCode();
    recordStat(state.mode, true, { seconds: finalSeconds, tiles: N, isDaily: isDailyWin, dateStr: todayIso() });
    var panel = document.getElementById('panel');
    panel.innerHTML =
      '<div class="emoji">' + (isDailyWin ? '🗓️' : '🀄') + '</div>' +
      '<h2>Klart!</h2>' +
      '<p>' + (isDailyWin ? 'Du klarade dagens utmaning!' : 'Du rensade hela brädet.') + '</p>' +
      '<div class="big-stat">' + fmt(finalSeconds) + '</div>' +
      (pen > 0 ? '<div class="pen-note">⏱️ ' + fmt(state.seconds) + ' + ' + pen + ' s straff (' + penBreakdown() + ')</div>' : '') +
      '<div class="best">' + (isBest ? '🏆 Nytt rekord!' : 'Bästa tid: ' + fmt(best)) + '</div>' +
      (state.fromShare ? '<div id="lbSeedArea" class="lb-area"></div>' : '') +
      '<div id="lbArea" class="lb-area"></div>' +
      (state.seed ? '<button id="pShare" class="ghost">🔗 Dela denna giv</button>' : '') +
      '<button id="pNew">Ny giv</button>';
    document.getElementById('overlay').classList.add('show');
    document.getElementById('pNew').onclick = function(){ hideOverlay(); newGame(); };
    var pShare = document.getElementById('pShare');
    if(pShare) pShare.onclick = function(){ shareCurrentGame(pShare); };
    setupWinLeaderboard(document.getElementById('lbArea'), N, state.mode, finalSeconds, state.moves, state.seed, function(){
      if(state.fromShare) setupSeedLeaderboard(document.getElementById('lbSeedArea'), state.seed);
    });
    sfx('win');
    if(navigator.vibrate) try { navigator.vibrate([20,40,20]); } catch(e){}
  }

     Lägg till en ny post ÖVERST i CHANGELOG vid varje uppdatering du vill
     notifiera spelarna om. v = kort unik id (datum funkar bra). */
  var CHANGELOG = [
    { v:'2026-07-21', items:[
      'Daglig utmaning — samma giv för alla varje dag, med egen topplista',
      'Klicka på en utmaning i listan för att se topplistan innan du spelar',

      'Statistik, märken och ljudeffekter (av/på)'
    ] }
  ];
  var SEEN_KEY = 'mahjong:seenVersion';
  function getSeenVersion(){ try { return localStorage.getItem(SEEN_KEY); } catch(e){ return null; } }
  function setSeenVersion(v){ try { localStorage.setItem(SEEN_KEY, v); } catch(e){} }
  function hasPriorActivity(){
    try {
      for(var i=0;i<localStorage.length;i++){
        var k = localStorage.key(i);
        if(k && k.indexOf('mahjong:') === 0 && k !== SEEN_KEY) return true;
      }
    } catch(e){}
    return false;
  }
  // Måste fångas HÄR, innan initGame() nedan hinner skapa mahjong:save m.fl.
  // — annars ser även en helt ny spelare ut att ha spelat förut.
  var hadPriorActivityAtLoad = hasPriorActivity();
  // Vilka poster (om några) som ska visas för den här spelaren just nu.
  function pendingChangelog(){
    var seen = getSeenVersion();
    if(seen == null){
      // Ingen sparad version. Helt ny spelare: inget att visa (markeras
      // som sett tyst). Återkommande spelare från innan denna funktion
      // fanns: visa senaste posten en gång.
      return hadPriorActivityAtLoad ? CHANGELOG.slice(0,1) : [];
    }
    var idx = -1;
    for(var i=0;i<CHANGELOG.length;i++) if(CHANGELOG[i].v === seen){ idx = i; break; }
    if(idx === -1) return CHANGELOG.slice(0,1); // okänd/gammal version -> visa senaste
    return CHANGELOG.slice(0, idx); // allt nyare än det spelaren sett
  }

  /* ---------- Ljud (Web Audio, syntetiskt) ---------- */
  var actx = null;
  function ac(){
    if(!actx){ try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ actx = false; } }
    if(actx && actx.state === 'suspended') actx.resume();
    return actx;
  }
  function tone(freq, start, dur, type, vol){
    var a = ac(); if(!a) return;
    var t0 = a.currentTime + start;
    var osc = a.createOscillator(), g = a.createGain();
    osc.type = type || 'sine'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g); g.connect(a.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  }
  function sfx(name, level){
    if(!cfg.sound) return;
    switch(name){
      case 'select': tone(600, 0, 0.06, 'sine', 0.12); break;
      case 'match':
        var base = 523 * Math.pow(1.06, Math.min((level||1)-1, 12));
        tone(base, 0, 0.10, 'sine', 0.18);
        tone(base*1.5, 0.05, 0.12, 'sine', 0.14);
        break;
      case 'invalid': tone(196, 0, 0.12, 'sawtooth', 0.10); break;
      case 'undo': tone(300, 0, 0.10, 'triangle', 0.12); break;
      case 'shuffle': tone(500, 0, 0.10, 'triangle', 0.12); tone(360, 0.08, 0.12, 'triangle', 0.10); break;
      case 'hint': tone(760, 0, 0.09, 'sine', 0.12); tone(1010, 0.07, 0.10, 'sine', 0.10); break;
      case 'win':
        [523,659,784,1047].forEach(function(f,i){ tone(f, i*0.12, 0.28, 'sine', 0.2); });
        break;
      case 'deadlock': tone(300, 0, 0.14, 'sawtooth', 0.10); tone(220, 0.12, 0.18, 'sawtooth', 0.10); break;
    }
  }

  /* ---------- Nytt spel ---------- */
  function applyModeUI(){
    var tm = state && state.mode === 'tilematch';
    document.getElementById('tray').style.display = tm ? 'flex' : 'none';
    document.getElementById('btnHint').style.display = tm ? 'none' : '';
    document.getElementById('statMidLabel').textContent = tm ? 'Kvar' : 'Par kvar';
  }
  // opts.seedInfo (från en delad länk/utmaning) → spela exakt den givan.
  // Annars: en helt ny giv, men hela slumpsekvensen (mönstervalet vid
  // "Slumpa mönster" + brickornas placering) drivs av ETT fräscht frö,
  // vilket gör att ÄVEN en vanlig giv alltid går att dela i efterhand.
  function newGame(opts){
    opts = opts || {};
    var mode, positions, layoutDef, rngSeed, fromShare = !!opts.fromShare;
    if(opts.seedInfo){
      var info = opts.seedInfo;
      mode = info.mode; layoutDef = info.layoutDef; rngSeed = info.rngSeed;
      seedRngFrom(rngSeed);
      positions = trimTo(layoutDef.build(), mode === 'tilematch' ? 3 : 2);
    } else {
      mode = cfg.mode === 'tilematch' ? 'tilematch' : 'classic';
      var list = LAYOUTS[cfg.size] || LAYOUTS.mellan;
      layoutDef = (cfg.pattern && cfg.pattern !== 'slumpa') ? list.filter(function(l){ return l.id===cfg.pattern; })[0] : null;
      // Mönstervalet (vid "Slumpa mönster") avgörs med oseedad slump INNAN
      // rng() seedas, så att den seedade sekvensen (som styr brickornas
      // placering) alltid börjar identiskt — annars skulle en delad giv
      // med slumpat mönster inte gå att återskapa exakt vid delning.
      if(!layoutDef) layoutDef = list[(Math.random()*list.length)|0];
      rngSeed = (Math.random() * 0xFFFFFFFF) >>> 0;
      seedRngFrom(rngSeed);
      positions = trimTo(layoutDef.build(), mode === 'tilematch' ? 3 : 2);
      clearGivParam();
    }
    setLayout(positions);
    var assign = mode === 'tilematch' ? generateTriples(POS) : generate(POS);
    unseedRng();
    if(!assign){ toast('Kunde inte skapa giv, försök igen'); return; }
    var seedCode = makeSeedCode(layoutDef.id, mode, rngSeed);
    state = { positions: positions, faces: assign, removed: new Array(N).fill(false),
              tray: [], undo: [], moves: 0, seconds: 0, done: false, mode: mode,
              tips: 0, shuffles: 0, seed: seedCode, fromShare: fromShare };
    if(fromShare && seedCode) setGivParam(seedCode);
    selected = -1; clearHint();
    statStart(mode);
    applyModeUI();
    updateChallengeBanner();
    paintFaces(); refresh(); renderTray(); save();
    document.getElementById('statTime').textContent = '0:00';
    startTimer();
  }

  /* ---------- Inställningar ---------- */
  function openSettings(){
    var pending = { size: cfg.size, pattern: cfg.pattern, mode: cfg.mode };
    var panel = document.getElementById('panel');
    function seg(v,l){ return '<button data-size="'+v+'"'+(pending.size===v?' class="on"':'')+'>'+l+'</button>'; }
    function render(){
      var list = LAYOUTS[pending.size];
      var opts = '<option value="slumpa">Slumpa mönster</option>' + list.map(function(l){
        var cnt = pending.mode === 'tilematch' ? l.n3 : l.n2;
        return '<option value="'+l.id+'"'+(l.id===pending.pattern?' selected':'')+'>'+l.name+' — '+cnt+' brickor</option>';
      }).join('');
      panel.innerHTML =
        '<h2>Inställningar</h2>' +
        '<div class="set-label">Spelläge</div>' +
        '<div class="seg" id="segMode">' +
          '<button data-mode="classic"'+(pending.mode==='classic'?' class="on"':'')+'>Klassisk par</button>' +
          '<button data-mode="tilematch"'+(pending.mode==='tilematch'?' class="on"':'')+'>Tile Match</button>' +
        '</div>' +
        '<div class="set-hint">'+(pending.mode==='tilematch'?'Plocka brickor till facket — tre lika försvinner.':'Para ihop två lika lediga brickor.')+'</div>' +
        '<div class="set-label">Antal brickor</div>' +
        '<div class="seg" id="segSize">'+seg('liten','Liten')+seg('mellan','Mellan')+seg('stor','Stor')+'</div>' +
        '<div class="set-hint">Färre brickor = större brickor.</div>' +
        '<div class="set-label">Mönster</div>' +
        '<select id="setPattern" class="wide-select">'+opts+'</select>' +
        '<div class="set-label">Ljud</div>' +
        '<div class="seg" id="segSound">' +
          '<button data-sound="1"'+(cfg.sound?' class="on"':'')+'>På</button>' +
          '<button data-sound="0"'+(!cfg.sound?' class="on"':'')+'>Av</button>' +
        '</div>' +
        (hasLeaderboard() ?
          '<div class="set-label">Namn (topplista)</div>' +
          '<input id="setName" class="wide-select lb-input" maxlength="20" placeholder="Ditt namn" value="'+esc(getName())+'" autocomplete="off">'
        : '') +
        '<div class="set-label">Dela</div>' +
        '<button id="setShare" class="ghost lb-btn">🔗 Dela denna giv</button>' +
        '<button id="setStart">Starta nytt spel</button>' +
        '<button id="setClose" class="ghost">Stäng</button>';
      document.getElementById('segMode').addEventListener('click', function(e){
        var b = e.target.closest('button'); if(!b) return;
        pending.mode = b.dataset.mode; pending.pattern = 'slumpa'; render();
      });
      document.getElementById('segSize').addEventListener('click', function(e){
        var b = e.target.closest('button'); if(!b) return;
        pending.size = b.dataset.size; pending.pattern = 'slumpa'; render();
      });
      document.getElementById('setPattern').addEventListener('change', function(){ pending.pattern = this.value; });
      document.getElementById('segSound').addEventListener('click', function(e){
        var b = e.target.closest('button'); if(!b) return;
        cfg.sound = b.dataset.sound === '1'; saveCfg(); if(cfg.sound) sfx('select'); render();
      });
      var setNameEl = document.getElementById('setName');
      if(setNameEl) setNameEl.addEventListener('input', function(){ setName(this.value.trim()); });
      var setShareBtn = document.getElementById('setShare');
      setShareBtn.onclick = function(){ shareCurrentGame(setShareBtn); };
      document.getElementById('setStart').onclick = function(){
        cfg.size = pending.size; cfg.pattern = pending.pattern; cfg.mode = pending.mode; saveCfg(); hideOverlay(); newGame();
      };
      document.getElementById('setClose').onclick = hideOverlay;
    }
    render();
    document.getElementById('overlay').classList.add('show');
  }

  function confirmNew(){
    var anyProgress = state && state.moves > 0 && !state.done;
    if(anyProgress){
      var panel = document.getElementById('panel');
      panel.innerHTML =
        '<div class="emoji">♻︎</div><h2>Ny giv?</h2>' +
        '<p>Det pågående spelet försvinner.</p>' +
        '<button id="pYes">Ja, ny giv</button>' +
        '<button id="pNo" class="ghost">Avbryt</button>';
      document.getElementById('overlay').classList.add('show');
      document.getElementById('pYes').onclick = function(){ hideOverlay(); newGame(); };
      document.getElementById('pNo').onclick = hideOverlay;
    } else {
      newGame();
    }
  }

  /* ---------- Init ---------- */
  function resumeSaved(s){
    state = s; setLayout(state.positions); applyModeUI();
    updateChallengeBanner();
    paintFaces(); refresh(); renderTray();
    document.getElementById('statTime').textContent = fmt(state.seconds);
    startTimer();
  }
  (function initGame(){
    var saved = loadSave();
    var givCode = getGivParam();
    if(!givCode){
      if(saved) resumeSaved(saved); else newGame();
      return;
    }
    var seedInfo = parseSeedCode(givCode);
    if(!seedInfo){
      clearGivParam();
      toast('Kunde inte läsa in den delade giv-länken');
      if(saved) resumeSaved(saved); else newGame();
      return;
    }
    if(saved && saved.seed === givCode){
      resumeSaved(saved); // samma utmaning redan pågående
      return;
    }
    if(saved && saved.moves > 0){
      // ett annat spel pågår — fråga innan det skrivs över
      var panel = document.getElementById('panel');
      panel.innerHTML =
        '<div class="emoji">🧩</div><h2>Delad utmaning</h2>' +
        '<p>Länken startar en delad giv. Ditt pågående spel skrivs över.</p>' +
        '<button id="pShareYes">Spela utmaningen</button>' +
        '<button id="pShareNo" class="ghost">Fortsätt mitt spel</button>';
      document.getElementById('overlay').classList.add('show');
      document.getElementById('pShareYes').onclick = function(){ hideOverlay(); newGame({ seedInfo: seedInfo, fromShare: true }); };
      document.getElementById('pShareNo').onclick = function(){ hideOverlay(); clearGivParam(); resumeSaved(saved); };
      return;
    }
    newGame({ seedInfo: seedInfo, fromShare: true });
  })();

  boardEl.addEventListener('click', onBoardClick);
  document.getElementById('btnNew').onclick = confirmNew;
  document.getElementById('btnUndo').onclick = undo;
  document.getElementById('btnHint').onclick = hint;
  document.getElementById('btnShuffle').onclick = shuffleRemaining;
  document.getElementById('btnSettings').onclick = openSettings;
  var btnLb = document.getElementById('btnLeaderboard');
  if(hasLeaderboard()) btnLb.onclick = function(){ openLeaderboard('global'); }; else btnLb.style.display = 'none';
  document.getElementById('btnStats').onclick = openStats;

  // Fråga efter namn första gången (om topplista finns och namn saknas)
  if(hasLeaderboard() && !getName()) openNamePrompt();

  // Nyheter: en helt ny spelare (allra första sidladdningen) markeras som
  // "sett" direkt och tyst — oavsett om namnfrågan råkar visas just nu —
  // så de aldrig ser "Nytt sedan sist" vid sitt andra besök. Återkommande
  // spelare med nytt innehåll att visa får det, men bara om ingen annan
  // ruta (giv-bekräftelse eller namnfråga) redan tar upp skärmen.
  if(getSeenVersion() == null && !hadPriorActivityAtLoad){
    setSeenVersion(CHANGELOG[0].v);
  } else if(!document.getElementById('overlay').classList.contains('show')){
    var newStuff = pendingChangelog();
    if(newStuff.length) openWhatsNew(newStuff);
  }

  var rz; window.addEventListener('resize', function(){ clearTimeout(rz); rz=setTimeout(fitBoard, 120); });
  window.addEventListener('orientationchange', function(){ setTimeout(fitBoard, 300); });
  document.getElementById('overlay').addEventListener('click', function(e){ if(e.target.id==='overlay') hideOverlay(); });

})();
</script>
</body>
</html>
