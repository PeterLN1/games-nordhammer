<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1c7fb8" data-light="#1c7fb8" data-dark="#0a1622">
<title>Öde ö</title>
<script src="/shared/theme.js"></script>
<style>
  :root {
    --sea: #1c7fb8; --sky: #cfe8f7;
    --bg: linear-gradient(180deg, #cfe8f7 0%, #a9d6ee 40%, #f3e2b3 100%);
    --panel: rgba(255,255,255,.72);
    --panel-brd: rgba(0,0,0,.10);
    --ink: #16283a; --ink-soft: #4b5f72;
    --btn: rgba(255,255,255,.85); --btn-brd: rgba(0,0,0,.14);
    --btn-ink: #16283a;
    --log-bg: rgba(255,255,255,.6);
    --shadow: rgba(20,50,80,.18);
    --hp: #e05c5c; --food: #d99a2b; --water: #2f9fd6; --energy: #6bbf59;
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme]){
      --bg: linear-gradient(180deg, #0a1622 0%, #0d2033 45%, #16324a 100%);
      --panel: rgba(255,255,255,.07);
      --panel-brd: rgba(255,255,255,.12);
      --ink: #eaf2fa; --ink-soft: #9db3c7;
      --btn: rgba(255,255,255,.10); --btn-brd: rgba(255,255,255,.16);
      --btn-ink: #eaf2fa;
      --log-bg: rgba(0,0,0,.22);
      --shadow: rgba(0,0,0,.4);
    }
  }
  :root[data-theme="dark"]{
    --bg: linear-gradient(180deg, #0a1622 0%, #0d2033 45%, #16324a 100%);
    --panel: rgba(255,255,255,.07);
    --panel-brd: rgba(255,255,255,.12);
    --ink: #eaf2fa; --ink-soft: #9db3c7;
    --btn: rgba(255,255,255,.10); --btn-brd: rgba(255,255,255,.16);
    --btn-ink: #eaf2fa;
    --log-bg: rgba(0,0,0,.22);
    --shadow: rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); background-attachment: fixed;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    touch-action: manipulation; overscroll-behavior: none;
  }
  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 560px; margin: 0 auto; }

  header {
    display: flex; align-items: center; gap: 8px;
    padding: max(8px, env(safe-area-inset-top)) 12px 8px;
  }
  .home {
    text-decoration: none; color: var(--ink); font-size: 20px;
    width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    border-radius: 10px; background: var(--panel); border: 1px solid var(--panel-brd);
  }
  .title { font-weight: 800; font-size: 18px; letter-spacing: .3px; }
  .day-chip {
    margin-left: auto; font-size: 13px; font-weight: 700;
    background: var(--panel); border: 1px solid var(--panel-brd);
    padding: 5px 10px; border-radius: 999px;
  }
  .theme-ctl select {
    font: inherit; font-size: 12px; color: var(--ink);
    background: var(--panel); border: 1px solid var(--panel-brd);
    border-radius: 10px; padding: 5px 6px;
  }

  .stats { padding: 4px 12px 8px; display: grid; gap: 7px; }
  .stat { display: grid; grid-template-columns: 22px 1fr 38px; align-items: center; gap: 8px; }
  .stat .ic { font-size: 16px; text-align: center; }
  .bar { height: 12px; border-radius: 999px; background: rgba(128,128,128,.22); overflow: hidden; }
  .bar > i { display: block; height: 100%; border-radius: 999px; transition: width .35s ease, background .35s ease; }
  .stat .val { font-size: 12px; font-weight: 700; text-align: right; color: var(--ink-soft); font-variant-numeric: tabular-nums; }

  .resbar {
    display: flex; gap: 8px; padding: 2px 12px 8px; flex-wrap: wrap;
    font-size: 12.5px; font-weight: 700; color: var(--ink-soft);
  }
  .res {
    background: var(--panel); border: 1px solid var(--panel-brd);
    padding: 5px 10px; border-radius: 999px; white-space: nowrap;
  }
  .res.actions { color: var(--ink); }

  .scene {
    margin: 2px 12px 8px; border-radius: 14px; overflow: hidden;
    border: 1px solid var(--panel-brd); box-shadow: 0 2px 10px var(--shadow);
    display: block; line-height: 0;
  }
  .scene svg { display: block; width: 100%; height: auto; }
  @keyframes camppop { 0% { transform: translateY(5px) scale(.85); opacity: .3; } 100% { transform: none; opacity: 1; } }
  @keyframes campshake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-3px) rotate(-1deg); } 60% { transform: translateX(3px) rotate(1deg); } }
  #campWrap, #raftWrap { transform-box: fill-box; transform-origin: bottom center; }
  #campWrap.pop, #raftWrap.pop { animation: camppop .45s ease; }
  #campWrap.shake { animation: campshake .4s ease; }
  @keyframes raftBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
  #raftWrap.ready { animation: raftBob 2.2s ease-in-out infinite; }

  @keyframes wxRainFall { 0% { transform: translateY(-6px); } 100% { transform: translateY(6px); } }
  .wxRainLine { animation: wxRainFall .4s linear infinite; }
  @keyframes wxBoltFlash { 0%,100% { opacity: 0; } 8%,14% { opacity: 1; } 22% { opacity: 0; } 46%,52% { opacity: .9; } 62% { opacity: 0; } }
  #wxBolt.flash { animation: wxBoltFlash 1.9s ease-in-out 1; }
  @keyframes wxSceneShake { 0%,100% { transform: translateX(0); } 15% { transform: translateX(-3px); } 35% { transform: translateX(3px); } 55% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
  .scene.storm-shake svg { animation: wxSceneShake .6s ease-in-out 1; }
  @keyframes wxShimmer { 0%,100% { opacity: .25; } 50% { opacity: .55; } }
  .wxShimmerLine { animation: wxShimmer 1.8s ease-in-out infinite; }

  .log {
    flex: 1; overflow-y: auto; margin: 0 12px; padding: 10px 12px;
    background: var(--log-bg); border: 1px solid var(--panel-brd);
    border-radius: 14px; -webkit-overflow-scrolling: touch;
  }
  .log .line { font-size: 13.5px; line-height: 1.5; padding: 3px 0; color: var(--ink); }
  .log .line small { color: var(--ink-soft); font-weight: 700; }
  .log .day-sep {
    text-align: center; font-size: 12px; font-weight: 800; letter-spacing: .5px;
    color: var(--ink-soft); margin: 8px 0 4px; text-transform: uppercase;
  }
  .log .good { color: var(--energy); font-weight: 700; }
  .log .bad { color: var(--hp); font-weight: 700; }

  .actions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
  }
  button.act {
    font: inherit; font-weight: 700; font-size: 14px; color: var(--btn-ink);
    background: var(--btn); border: 1px solid var(--btn-brd);
    border-radius: 14px; padding: 12px 10px; text-align: left;
    display: flex; align-items: center; gap: 9px; cursor: pointer;
    transition: transform .1s ease, opacity .2s ease, box-shadow .15s ease;
    box-shadow: 0 2px 8px var(--shadow);
  }
  button.act .em { font-size: 20px; line-height: 1; }
  button.act .lbl { display: flex; flex-direction: column; gap: 1px; }
  button.act .lbl small { font-weight: 600; font-size: 11px; color: var(--ink-soft); }
  button.act:active { transform: scale(.96); }
  button.act:disabled { opacity: .4; box-shadow: none; cursor: default; }

  /* Overlay (start / game over) */
  .overlay {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    background: rgba(6,18,30,.55); backdrop-filter: blur(3px);
  }
  .overlay.hidden { display: none; }
  .modal {
    background: var(--bg); background-attachment: fixed;
    border: 1px solid var(--panel-brd); border-radius: 22px;
    padding: 26px 22px; max-width: 400px; width: 100%; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  .modal .big { font-size: 46px; margin-bottom: 6px; }
  .modal h2 { margin: 0 0 8px; font-size: 22px; color: var(--ink); }
  .modal p { margin: 0 0 6px; font-size: 14px; line-height: 1.5; color: var(--ink-soft); }
  .modal .rec { font-size: 13px; font-weight: 700; color: var(--ink); margin: 10px 0 4px; }
  button.primary {
    font: inherit; font-weight: 800; font-size: 16px; color: #fff;
    background: var(--sea); border: none; border-radius: 14px;
    padding: 14px 22px; margin-top: 16px; cursor: pointer; width: 100%;
    box-shadow: 0 6px 18px rgba(28,127,184,.4);
  }
  button.primary:active { transform: scale(.97); }
  .modal ul { text-align: left; font-size: 13px; line-height: 1.6; color: var(--ink-soft); margin: 12px 0 0; padding-left: 20px; }
</style>
</head>

<script>
"use strict";
(function(){
  var REC_KEY = "nordhammer:ode-o:record";
  var WIN_DAY = 10;         // överlev så här många dagar
  var ACTIONS_PER_DAY = 4;  // handlingar per dag

  var S = null;          // spelläge
  var sceneLast = null;  // senast renderad läger-nivå (för animation)
  var raftLast = null;   // senast renderad flotte-nivå (för animation)
  var stormTimer = null; // timeout-id för pågående stormblixt

  function rint(a, b){ return a + Math.floor(Math.random() * (b - a + 1)); } // inkl. b
  function chance(p){ return Math.random() < p; }
  function clamp(v){ return Math.max(0, Math.min(100, v)); }

  function newGame(){
    S = {
      day: 1,
      actionsLeft: ACTIONS_PER_DAY,
      health: 100, food: 80, water: 80, energy: 90,
      wood: 0, camp: 0, raft: 0,
      gear: { spjut: false, flaska: false, kniv: false },
      raftMats: { rep: false, segel: false },
      waterFound: false,   // hittad färskvattenkälla → effektivare vatten
      weather: "sol", stormFlash: false,
      over: false, log: []
    };
    sceneLast = null;
    raftLast = null;
    if(stormTimer){ clearTimeout(stormTimer); stormTimer = null; }
    var sceneEl = document.getElementById("scene");
    if(sceneEl) sceneEl.classList.remove("storm-shake");
    var boltEl = document.getElementById("wxBolt");
    if(boltEl) boltEl.classList.remove("flash");
    var raftWrapEl = document.getElementById("raftWrap");
    if(raftWrapEl) raftWrapEl.classList.remove("pop", "ready");
    logDay(1);
    add("Du vaknar på en öde strand. Vraket sjönk. Du har " + WIN_DAY + " dagar — men ingen kommer och räddar dig av sig själv.");
    render();
  }

  // ---- Dagbok ----
  function add(text, cls){ S.log.push({ t: "line", text: text, cls: cls || "" }); }
  function logDay(n){ S.log.push({ t: "day", text: "Dag " + n }); }

  // ---- Handlingar ----
  var ACT = {
    fish: function(){
      S.energy = clamp(S.energy - 12);
      var p = 0.55 + (S.gear.spjut ? 0.25 : 0);
      if(chance(p)){
        var g = rint(14, 24) + (S.camp >= 1 ? 10 : 0); // eld = tillagning
        S.food = clamp(S.food + g);
        add("🎣 Du fångade en fisk" + (S.camp >= 1 ? " och grillade den över elden" : "") +
            ". <small>Mat +" + g + "</small>", "good");
      } else {
        add("🎣 Fisken nappade inte. Tom hand denna gång.");
      }
    },
    water: function(){
      S.energy = clamp(S.energy - 6);
      var base = S.waterFound ? rint(30, 40) : rint(18, 26);
      if(S.weather === "regn") base += 10;
      if(S.gear.flaska) base += 8; // kan bära hem mer
      S.water = clamp(S.water + base);
      add("💧 Du drack och fyllde på vatten" + (S.waterFound ? " vid källan" : "") +
          ". <small>Vatten +" + base + "</small>", "good");
    },
    forest: function(){
      S.energy = clamp(S.energy - 12);
      var w = rint(2, 3) + (S.gear.kniv ? 1 : 0);
      S.wood += w;
      var msg = "🌴 Du samlade ved. <small>Ved +" + w + "</small>";
      if(chance(0.5)){
        var f = rint(12, 20);
        S.food = clamp(S.food + f);
        msg += " Du hittade också frukt. <small>Mat +" + f + "</small>";
      }
      add(msg, "good");
    },
    explore: function(){
      S.energy = clamp(S.energy - 15);
      var roll = Math.random();
      // Hitta föremål (om något återstår) — annars resurser eller otur
      var missing = [];
      if(!S.gear.spjut) missing.push("spjut");
      if(!S.gear.flaska) missing.push("flaska");
      if(!S.gear.kniv) missing.push("kniv");
      if(!S.raftMats.rep) missing.push("rep");
      if(!S.raftMats.segel) missing.push("segel");

      if(!S.waterFound && roll < 0.20){
        S.waterFound = true;
        add("🔍 Du upptäckte en <b>färskvattenkälla</b> inne på ön! Vatten blir lättare härefter.", "good");
      } else if(missing.length && roll < 0.48){
        var item = missing[rint(0, missing.length - 1)];
        var names = { spjut: "ett fiskespjut 🔱 (bättre fiske)", flaska: "en flaska 🧴 (bär mer vatten)", kniv: "en kniv 🔪 (mer ved)", rep: "ett rep 🪢 (för flottens mast)", segel: "en bit segelduk ⛵ (för flottens segel)" };
        if(item === "rep" || item === "segel") S.raftMats[item] = true; else S.gear[item] = true;
        add("🔍 Bland vrakspillrorna hittade du " + names[item] + ".", "good");
      } else if(roll < 0.72){
        var w = rint(2, 4);
        S.wood += w;
        add("🔍 Du hittade uppspolat drivved. <small>Ved +" + w + "</small>", "good");
      } else if(roll < 0.88){
        var b = rint(14, 22);
        S.food = clamp(S.food + b);
        add("🔍 Du fann ett bärsnår. <small>Mat +" + b + "</small>", "good");
      } else {
        var d = rint(6, 12);
        S.health = clamp(S.health - d);
        add("🔍 Du snubblade på klipporna och skadade dig. <small>Hälsa −" + d + "</small>", "bad");
      }
    },
    build: function(){
      if(S.camp < 3){
        var cost = 3 + S.camp; // dyrare för varje nivå
        if(S.wood < cost){ add("⛺ Du behöver " + cost + " ved för att bygga vidare (har " + S.wood + ")."); return false; }
        S.wood -= cost;
        S.energy = clamp(S.energy - 10);
        S.camp += 1;
        var lvl = ["", "enkelt vindskydd med lägereld", "stabil hydda", "rejält läger med förråd"][S.camp];
        add("🔥 Du byggde ett " + lvl + ". <small>Läger nivå " + S.camp + "</small>", "good");
        return;
      }
      // Lägret är fullt utbyggt — nu gäller flotten som ska ta dig hem
      if(S.raft >= 3){
        add("⛵ Du sätter segel mot havet — äntligen på väg hem!", "good");
        endGame(true, "raft");
        return false;
      }
      if(S.raft === 1 && !S.raftMats.rep){ add("🛟 Du behöver rep för att resa masten. Utforska ön för att hitta mer."); return false; }
      if(S.raft === 2 && !S.raftMats.segel){ add("🛟 Du behöver segelduk för att hissa seglet. Utforska ön för att hitta mer."); return false; }
      var raftCost = [4, 5, 3][S.raft];
      if(S.wood < raftCost){ add("🛟 Du behöver " + raftCost + " ved för flotten (har " + S.wood + ")."); return false; }
      S.wood -= raftCost;
      S.energy = clamp(S.energy - 12);
      S.raft += 1;
      var rmsg = ["", "Du band ihop stockar till ett flottskrov.", "Du reste en mast och surrade fast den med rep.", "Du hissade seglet — flotten är redo att segla!"][S.raft];
      add("🛟 " + rmsg, "good");
    },
    rest: function(){
      var g = 24 + S.camp * 10;
      S.energy = clamp(S.energy + g);
      add("😴 Du vilade" + (S.camp >= 1 ? " i skydd" : " på stranden") + ". <small>Energi +" + g + "</small>", "good");
    }
  };

  function doAct(name){
    if(S.over || S.actionsLeft <= 0) return;
    var res = ACT[name]();
    if(res === false) { render(); return; } // ogiltig handling, ingen tid förbrukas
    S.actionsLeft -= 1;
    if(S.actionsLeft <= 0) nightfall();
    checkEnd();
    render();
  }

  // ---- Natten ----
  function nightfall(){
    if(S.over) return;
    S.log.push({ t: "line", text: "🌙 <b>Natten faller…</b>", cls: "" });

    // Dagens förbrukning
    var foodUse = 18, waterUse = 22;
    if(S.weather === "hetta") waterUse += 8;
    S.food = clamp(S.food - foodUse);
    S.water = clamp(S.water - waterUse);

    // Skydd mot kylan
    if(S.camp === 0){
      S.energy = clamp(S.energy - 12);
      add("Utan skydd frös du genom natten. <small>Energi −12</small>", "bad");
    } else {
      add("Lägret höll dig varm genom natten.");
    }

    // Skador av brist
    if(S.food === 0){ S.health = clamp(S.health - 15); add("Du svälter. <small>Hälsa −15</small>", "bad"); }
    if(S.water === 0){ S.health = clamp(S.health - 20); add("Du är uttorkad. <small>Hälsa −20</small>", "bad"); }
    if(S.energy === 0){ S.health = clamp(S.health - 10); add("Total utmattning. <small>Hälsa −10</small>", "bad"); }

    // God natt → återhämtning
    if(S.food > 40 && S.water > 40 && S.energy > 40 && S.health < 100){
      var h = 8 + S.camp * 2;
      S.health = clamp(S.health + h);
      add("Välmätt och utvilad läkte du. <small>Hälsa +" + h + "</small>", "good");
    }

    checkEnd();
    if(S.over) return;

    // Ny dag
    S.day += 1;
    if(S.day > WIN_DAY){
      if(S.raft >= 3) endGame(true, "timeout-ready");
      else endGame(false, "timeout-miss");
      return;
    }

    S.actionsLeft = ACTIONS_PER_DAY;
    rollWeather();
    logDay(S.day);
    add(weatherText());
  }

  function rollWeather(){
    var r = Math.random();
    S.weather = r < 0.5 ? "sol" : r < 0.75 ? "moln" : r < 0.9 ? "regn" : "hetta";
    S.stormFlash = false;
    // Storm kan skada lägret
    if(chance(0.12) && S.camp > 0){
      S.camp -= 1;
      S.weather = "storm";
      S.stormFlash = true; // dramatisk blixt-animation vid dagens första rendering
    }
  }
  function weatherText(){
    switch(S.weather){
      case "regn": return "☔ Det regnar — lättare att samla vatten idag.";
      case "hetta": return "🥵 Stekhett — du blir törstig snabbare.";
      case "storm": return "🌩️ En storm rev delar av ditt läger i natt!";
      case "moln": return "☁️ Mulet och svalt.";
      default: return "☀️ En klar dag på ön.";
    }
  }

  // ---- Slut ----
  function checkEnd(){ if(!S.over && S.health <= 0) endGame(false, "death"); }

  function endGame(won, reason){
    S.over = true;
    var survived = reason === "raft" ? S.day : Math.min(S.day, WIN_DAY);
    var rec = getRecord();
    var isNew = survived > rec.days || (survived === rec.days && won && !rec.won);
    if(isNew){ setRecord(survived, won); rec = { days: survived, won: won }; }
    render();
    showEnd(won, survived, rec, reason, isNew);
  }

  // ---- Rekord ----
  function getRecord(){
    var raw; try { raw = localStorage.getItem(REC_KEY); } catch(e){}
    if(!raw) return { days: 0, won: false };
    var parts = raw.split("|");
    var days = parseInt(parts[0], 10) || 0;
    var won = parts.length > 1 ? parts[1] === "1" : days >= WIN_DAY;
    return { days: days, won: won };
  }
  function setRecord(days, won){ try { localStorage.setItem(REC_KEY, days + "|" + (won ? "1" : "0")); } catch(e){} }

  // ---- Rendering ----
  function setBar(id, v, color){
    var el = document.getElementById("bar-" + id);
    el.style.width = v + "%";
    el.style.background = v <= 20 ? "var(--hp)" : color;
    document.getElementById("val-" + id).textContent = v;
  }
  function render(){
    setBar("health", S.health, "var(--hp)");
    setBar("food", S.food, "var(--food)");
    setBar("water", S.water, "var(--water)");
    setBar("energy", S.energy, "var(--energy)");

    document.getElementById("dayChip").textContent = "Dag " + Math.min(S.day, WIN_DAY) + " / " + WIN_DAY;
    document.getElementById("resActions").textContent = "Handlingar: " + S.actionsLeft;
    document.getElementById("resWood").textContent = "🪵 Ved " + S.wood;
    document.getElementById("resCamp").textContent = "⛺ Läger " + S.camp;
    document.getElementById("resRaft").textContent = "🛟 Flotte " + S.raft + "/3";

    var g = [];
    if(S.gear.spjut) g.push("🔱");
    if(S.gear.flaska) g.push("🧴");
    if(S.gear.kniv) g.push("🔪");
    document.getElementById("resGear").textContent = "🎒 " + (g.length ? g.join(" ") : "—");

    updateBuildButton();
    renderScene();
    renderLog();
    var dis = S.over || S.actionsLeft <= 0;
    var btns = document.querySelectorAll("button.act");
    for(var i=0;i<btns.length;i++) btns[i].disabled = dis;
  }
  function renderLog(){
    var box = document.getElementById("log");
    var html = "";
    for(var i=0;i<S.log.length;i++){
      var e = S.log[i];
      if(e.t === "day") html += '<div class="day-sep">— ' + e.text + ' —</div>';
      else html += '<div class="line ' + e.cls + '">' + e.text + '</div>';
    }
    box.innerHTML = html;
    box.scrollTop = box.scrollHeight;
  }

  function updateBuildButton(){
    var em = document.getElementById("buildEm");
    var lbl = document.getElementById("buildLbl");
    var sub = document.getElementById("buildSub");
    if(S.camp < 3){
      em.textContent = "🔥"; lbl.textContent = "Bygg läger"; sub.textContent = "−ved";
    } else if(S.raft < 3){
      em.textContent = "🛟"; lbl.textContent = "Bygg flotte";
      if(S.raft === 1 && !S.raftMats.rep) sub.textContent = "Kräver rep";
      else if(S.raft === 2 && !S.raftMats.segel) sub.textContent = "Kräver segelduk";
      else sub.textContent = "−ved";
    } else {
      em.textContent = "⛵"; lbl.textContent = "Sätt segel"; sub.textContent = "Fly ön!";
    }
  }

  function show(id, on){ var el = document.getElementById(id); if(el) el.style.display = on ? "" : "none"; }
  function renderScene(){
    var c = S.camp;
    show("camp-l1", c === 1);
    show("camp-l2", c === 2);
    show("camp-l3", c >= 3);
    show("fire", c >= 1);

    var logs = document.querySelectorAll("#woodpile .woodlog");
    var n = Math.min(logs.length, S.wood);
    for(var i=0;i<logs.length;i++) logs[i].style.display = i < n ? "" : "none";

    if(sceneLast !== null && c !== sceneLast){
      var wrap = document.getElementById("campWrap");
      var cls = c > sceneLast ? "pop" : "shake";
      wrap.classList.remove("pop", "shake");
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ wrap.classList.add(cls); }); });
    }
    sceneLast = c;

    var r = S.raft;
    show("raft-l1", r === 1);
    show("raft-l2", r === 2);
    show("raft-l3", r >= 3);
    var raftWrap = document.getElementById("raftWrap");
    raftWrap.classList.toggle("ready", r >= 3);
    if(raftLast !== null && r > raftLast){
      raftWrap.classList.remove("pop");
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ raftWrap.classList.add("pop"); }); });
    }
    raftLast = r;

    renderWeather();
  }

  var WX_TINT = { sol: [null, 0], moln: ["#8a97a3", 0.18], regn: ["#4d6270", 0.30], hetta: ["#ffb454", 0.14], storm: ["#131a22", 0.55] };

  function renderWeather(){
    var w = S.weather;
    show("sun", w === "sol" || w === "hetta");
    show("sunGlow", w === "hetta");
    show("cloudsCalm", w === "sol");
    show("cloudsGray", w === "moln" || w === "regn" || w === "storm");
    show("wxHeat", w === "hetta");
    show("wxRain", w === "regn" || w === "storm");
    show("wave1", w !== "storm");
    show("wave2", w !== "storm");
    show("waveStorm1", w === "storm");
    show("waveStorm2", w === "storm");

    var tint = WX_TINT[w] || WX_TINT.sol;
    var tintEl = document.getElementById("wxTint");
    tintEl.setAttribute("fill", tint[0] || "#000000");
    tintEl.setAttribute("opacity", tint[1]);

    if(S.stormFlash){
      S.stormFlash = false; // fyr av bara en gång per storm
      var scene = document.getElementById("scene");
      var bolt = document.getElementById("wxBolt");
      scene.classList.remove("storm-shake");
      bolt.classList.remove("flash");
      if(stormTimer) clearTimeout(stormTimer);
      requestAnimationFrame(function(){ requestAnimationFrame(function(){
        scene.classList.add("storm-shake");
        bolt.classList.add("flash");
      }); });
      stormTimer = setTimeout(function(){
        scene.classList.remove("storm-shake");
        bolt.classList.remove("flash");
        stormTimer = null;
      }, 1900);
    }
  }

  // ---- Overlays ----
  function showStart(){
    var rec = getRecord();
    var recLine = rec.days > 0 ? '<div class="rec">🏆 Rekord: ' + rec.days + ' dagar' + (rec.won ? ' (räddad!)' : '') + '</div>' : '';
    document.getElementById("modal").innerHTML =
      '<div class="big">🏝️</div>' +
      '<h2>Öde ö</h2>' +
      '<p>Ditt skepp har sjunkit. Du har <b>' + WIN_DAY + ' dagar</b> på dig — men ingen räddar dig av sig själv.</p>' +
      '<ul>' +
        '<li>Varje dag har du <b>' + ACTIONS_PER_DAY + ' handlingar</b>.</li>' +
        '<li>Håll mat, vatten och energi över noll — annars sjunker hälsan.</li>' +
        '<li>Bygg läger med ved för att klara nätterna.</li>' +
        '<li>När lägret är klart — bygg en flotte av ved, rep och segelduk för att kunna fly.</li>' +
        '<li>Utforska ön för att hitta källor, verktyg och flottdelar.</li>' +
      '</ul>' +
      recLine +
      '<button class="primary" id="startBtn">Skölj i land 🌊</button>';
    document.getElementById("overlay").classList.remove("hidden");
    document.getElementById("startBtn").onclick = function(){
      document.getElementById("overlay").classList.add("hidden");
      newGame();
    };
  }
  function showEnd(won, survived, rec, reason, isNew){
    var icon = won ? "⛵" : (reason === "timeout-miss" ? "🚢" : "💀");
    var title = won ? "Räddad!" : (reason === "timeout-miss" ? "Skeppet såg dig aldrig" : "Du klarade dig inte");
    var body;
    if(reason === "raft") body = "Dag " + survived + " sätter du segel på din egen flotte och lämnar ön för gott!";
    else if(reason === "timeout-ready") body = "Dag " + WIN_DAY + " syns ett skepp vid horisonten — och den här gången ser de dig. Du är räddad!";
    else if(reason === "timeout-miss") body = "Dag " + WIN_DAY + " kom och gick. Ett skepp passerade långt ute — men utan en flotte att signalera med såg ingen dig. Du överlevde ön, men kom aldrig hem.";
    else body = "Du överlevde <b>" + survived + "</b> " + (survived === 1 ? "dag" : "dagar") + " på ön.";
    document.getElementById("modal").innerHTML =
      '<div class="big">' + icon + '</div>' +
      '<h2>' + title + '</h2>' +
      '<p>' + body + '</p>' +
      '<div class="rec">🏆 Rekord: ' + rec.days + ' dagar' + (rec.won ? ' (räddad!)' : '') + (isNew ? " — nytt rekord!" : "") + '</div>' +
      '<button class="primary" id="againBtn">' + (won ? "Spela igen" : "Försök igen") + '</button>';
    document.getElementById("overlay").classList.remove("hidden");
    document.getElementById("againBtn").onclick = function(){
      document.getElementById("overlay").classList.add("hidden");
      newGame();
    };
  }

  // ---- Koppling ----
  document.getElementById("actions").addEventListener("click", function(ev){
    var b = ev.target.closest("button.act");
    if(b && !b.disabled) doAct(b.getAttribute("data-act"));
  });

  showStart();
})();
</script>
</body>
</html>
