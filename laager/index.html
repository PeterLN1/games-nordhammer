<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#140d24">
<title>Läger — 3D-demo</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
    background: #140d24; color: #f2eee0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }

  .hud {
    position: fixed; left: 0; right: 0; z-index: 5;
    display: flex; align-items: center; justify-content: space-between;
    padding: max(14px, env(safe-area-inset-top)) 16px 0;
    pointer-events: none;
  }
  .hud a {
    pointer-events: auto;
    text-decoration: none; color: #f2eee0; font-size: 13px; font-weight: 600;
    background: rgba(20,13,36,.55); border: 1px solid rgba(255,255,255,.15);
    padding: 8px 13px; border-radius: 999px; backdrop-filter: blur(6px);
  }
  .hud h1 {
    margin: 0; font-size: 14px; font-weight: 700; letter-spacing: .3px;
    background: rgba(20,13,36,.55); border: 1px solid rgba(255,255,255,.15);
    padding: 8px 13px; border-radius: 999px; backdrop-filter: blur(6px);
  }

  .hint {
    position: fixed; left: 50%; bottom: max(22px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    font-size: 12.5px; color: rgba(242,238,224,.75);
    background: rgba(20,13,36,.55); border: 1px solid rgba(255,255,255,.15);
    padding: 7px 14px; border-radius: 999px; backdrop-filter: blur(6px);
    z-index: 5; transition: opacity .6s ease; pointer-events: none;
  }
  .hint.hidden { opacity: 0; }

  .fps {
    position: fixed; right: 10px; bottom: 10px; z-index: 5;
    font-size: 10px; color: rgba(242,238,224,.4); font-variant-numeric: tabular-nums;
    pointer-events: none;
  }

  .fab {
    position: fixed; right: 16px; bottom: max(22px, env(safe-area-inset-bottom));
    z-index: 6; width: 52px; height: 52px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    background: rgba(20,13,36,.7); border: 1px solid rgba(255,255,255,.18);
    color: #f2eee0; backdrop-filter: blur(6px);
  }
  .fab.on { background: #ffb14a; color: #241505; border-color: transparent; }
  .fab.demolish { bottom: max(84px, calc(env(safe-area-inset-bottom) + 84px)); }
  .fab.demolish.on { background: #e0665a; color: #2a0d0a; }

  .build-panel {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 6;
    padding: 12px 16px max(14px, env(safe-area-inset-bottom));
    background: rgba(16,11,26,.82); backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,.12);
    display: flex; flex-direction: column; gap: 10px;
  }
  .build-panel.hidden { display: none; }

  .resources { display: flex; gap: 14px; font-size: 13px; font-weight: 600; }

  .structures { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
  .struct-btn {
    flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 11px; font-weight: 600; color: #f2eee0;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14);
    border-radius: 12px; padding: 8px 12px; min-width: 62px;
  }
  .struct-btn .ic { font-size: 18px; }
  .struct-btn.selected { border-color: #ffb14a; background: rgba(255,177,74,.16); }
  .struct-btn .cost { opacity: .6; font-weight: 500; }

  .build-actions { display: flex; gap: 10px; }
  .build-actions button {
    flex: 1; padding: 10px; border-radius: 12px; font-size: 14px; font-weight: 700;
    border: 1px solid rgba(255,255,255,.14);
  }
  #buildCancel, #buildRotate { background: rgba(255,255,255,.06); color: #f2eee0; }
  #buildRotate { flex: 0 0 auto; padding: 10px 16px; }
  #buildConfirm { background: #ffb14a; color: #241505; border-color: transparent; }
  #buildConfirm:disabled { background: rgba(255,255,255,.1); color: rgba(242,238,224,.4); }
</style>
</head>
<body>
  <div id="app"></div>

  <div class="hud">
    <a href="/">← Spel</a>
    <h1>Läger · 3D-demo</h1>
  </div>
  <div class="hint" id="hint">Tryck för att gå dit · dra för att rotera · nyp för att zooma</div>
  <div class="fps" id="fps"></div>

  <button class="fab demolish" id="demolishToggle" aria-label="Riv-läge">🗑</button>
  <button class="fab" id="buildToggle" aria-label="Bygg-läge">🔨</button>
  <div class="build-panel hidden" id="buildPanel">
    <div class="resources">
      <span>🪵 <span id="resWood">0</span></span>
      <span>🪨 <span id="resStone">0</span></span>
    </div>
    <div class="structures" id="structureList"></div>
    <div class="build-actions">
      <button id="buildCancel">✕ Avbryt</button>
      <button id="buildRotate">↻ Rotera</button>
      <button id="buildConfirm" disabled>✓ Bygg</button>
    </div>
  </div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
  }
}
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
