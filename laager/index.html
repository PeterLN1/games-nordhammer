<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#140d24">
<title>Läger — 3D-demo</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
    background: #140d24; color: #f2eee0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }

  .hud {
    position: fixed; left: 0; right: 0; z-index: 5;
    display: flex; align-items: center; justify-content: space-between;
    padding: max(14px, env(safe-area-inset-top)) 16px 0;
    pointer-events: none;
  }
  .hud a {
    pointer-events: auto;
    text-decoration: none; color: #f2eee0; font-size: 13px; font-weight: 600;
    background: rgba(20,13,36,.55); border: 1px solid rgba(255,255,255,.15);
    padding: 8px 13px; border-radius: 999px; backdrop-filter: blur(6px);
  }
  .hud h1 {
    margin: 0; font-size: 14px; font-weight: 700; letter-spacing: .3px;
    background: rgba(20,13,36,.55); border: 1px solid rgba(255,255,255,.15);
    padding: 8px 13px; border-radius: 999px; backdrop-filter: blur(6px);
  }

  .hint {
    position: fixed; left: 50%; bottom: max(22px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    font-size: 12.5px; color: rgba(242,238,224,.75);
    background: rgba(20,13,36,.55); border: 1px solid rgba(255,255,255,.15);
    padding: 7px 14px; border-radius: 999px; backdrop-filter: blur(6px);
    z-index: 5; transition: opacity .6s ease; pointer-events: none;
  }
  .hint.hidden { opacity: 0; }

  .fps {
    position: fixed; right: 10px; bottom: 10px; z-index: 5;
    font-size: 10px; color: rgba(242,238,224,.4); font-variant-numeric: tabular-nums;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div id="app"></div>

  <div class="hud">
    <a href="/">← Spel</a>
    <h1>Läger · 3D-demo</h1>
  </div>
  <div class="hint" id="hint">Tryck på marken för att gå dit</div>
  <div class="fps" id="fps"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
  }
}
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
